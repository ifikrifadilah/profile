<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Eau de Printemps — Stable Ultra HD Koi Water Garden</title>
  <style>
    :root{
      --glass: rgba(255,255,255,.32);
      --glass-line: rgba(255,255,255,.58);
      --text: rgba(44,58,72,.86);
      --shadow: 0 18px 55px rgba(72,112,136,.18);
    }
    *{box-sizing:border-box} html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#dff0f7;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    #stage{position:fixed;inset:0;overflow:hidden;isolation:isolate;background-image:radial-gradient(circle at 55% 32%,rgba(251,254,255,.10) 0%,rgba(220,239,247,.05) 46%,rgba(201,227,240,.09) 100%),url('assets/flower-water-ultrahd-1920x1080.jpg');background-size:cover;background-position:center;background-repeat:no-repeat;touch-action:none;cursor:crosshair;}
    canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
    #water{z-index:1;display:none} #fish{z-index:2;mix-blend-mode:multiply;opacity:.93;filter:saturate(1.24) contrast(1.10) brightness(.985) blur(0px)} #ripples{z-index:3;mix-blend-mode:screen;opacity:.98;filter:contrast(1.08) saturate(1.08)} #caustics{z-index:4;mix-blend-mode:screen;opacity:.90} #sparkles{z-index:5;mix-blend-mode:screen}
    .vignette{position:absolute;inset:-2px;z-index:6;pointer-events:none;background:radial-gradient(circle at 50% 42%,rgba(255,255,255,0) 0%,rgba(255,255,255,.08) 46%,rgba(151,190,212,.12) 100%);mix-blend-mode:soft-light;}
    .topcopy{position:absolute;left:clamp(18px,3vw,46px);top:clamp(16px,2.6vw,38px);z-index:8;color:var(--text);text-shadow:0 1px 16px rgba(255,255,255,.7);pointer-events:none;}
    .eyebrow{font-size:clamp(12px,1vw,14px);letter-spacing:.18em;text-transform:uppercase;opacity:.66;margin:0 0 8px}
    h1{font-family:Georgia,"Times New Roman",serif;font-weight:500;font-size:clamp(34px,5vw,78px);line-height:.9;letter-spacing:-.05em;margin:0;color:rgba(22,35,50,.82)}
    .sub{margin:12px 0 0;font-size:clamp(13px,1.1vw,17px);opacity:.68;max-width:540px}
    #snapshot{position:absolute;right:clamp(18px,2.4vw,36px);bottom:clamp(18px,2.4vw,32px);z-index:9;border:1px solid var(--glass-line);background:linear-gradient(135deg,rgba(255,255,255,.56),rgba(236,250,255,.28));color:rgba(48,68,84,.86);backdrop-filter:blur(18px) saturate(1.25);-webkit-backdrop-filter:blur(18px) saturate(1.25);box-shadow:var(--shadow);border-radius:999px;padding:12px 18px;font-size:13px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;cursor:pointer;transition:transform .18s ease, background .18s ease, opacity .3s ease;}
    #snapshot:hover{transform:translateY(-2px);background:linear-gradient(135deg,rgba(255,255,255,.72),rgba(236,250,255,.38));}
    #speaker{position:absolute;left:clamp(18px,2.4vw,36px);bottom:clamp(18px,2.4vw,32px);z-index:9;width:56px;height:56px;border-radius:999px;border:1px solid rgba(255,255,255,.58);background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(232,246,252,.28));color:rgba(48,68,84,.90);backdrop-filter:blur(22px) saturate(1.35);-webkit-backdrop-filter:blur(22px) saturate(1.35);box-shadow:0 16px 40px rgba(80,120,145,.20), inset 0 1px 0 rgba(255,255,255,.72), inset 0 -10px 18px rgba(205,232,243,.16);display:grid;place-items:center;cursor:pointer;transition:transform .18s ease,background .18s ease,box-shadow .18s ease,opacity .25s ease;overflow:hidden;}
    #speaker::before{content:'';position:absolute;inset:1px;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.34),rgba(255,255,255,.06));pointer-events:none;}
    #speaker:hover{transform:translateY(-2px);background:linear-gradient(180deg,rgba(255,255,255,.84),rgba(236,250,255,.38));box-shadow:0 20px 46px rgba(80,120,145,.22), inset 0 1px 0 rgba(255,255,255,.82), inset 0 -10px 18px rgba(205,232,243,.18);}
    #speaker.playing{background:linear-gradient(180deg,rgba(255,255,255,.88),rgba(218,245,255,.46));}
    #speaker.error{opacity:.55}
    #speaker .speaker-shell{position:relative;display:grid;place-items:center;width:100%;height:100%;z-index:1;}
    #speaker svg{width:24px;height:24px;display:block;overflow:visible;filter:drop-shadow(0 1px 0 rgba(255,255,255,.55));}
    #speaker .speaker-body{fill:rgba(61,85,103,.92);}
    #speaker .speaker-wave{fill:none;stroke:rgba(61,85,103,.88);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;opacity:.95;}
    #speaker .speaker-mute{stroke:rgba(61,85,103,.85);stroke-width:2.05;stroke-linecap:round;}
    #speaker .speaker-dot{position:absolute;right:13px;top:13px;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.78);box-shadow:0 0 0 1px rgba(255,255,255,.35), 0 2px 8px rgba(255,255,255,.32);}
    #speaker.playing .speaker-dot{background:linear-gradient(180deg,#c8f6ff,#8fe6ff);box-shadow:0 0 0 1px rgba(255,255,255,.45), 0 0 12px rgba(143,230,255,.55);}
    #hint{position:absolute;left:50%;bottom:clamp(20px,2.7vw,38px);transform:translateX(-50%);z-index:8;padding:10px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.52);background:rgba(255,255,255,.23);backdrop-filter:blur(16px);color:rgba(57,75,91,.74);font-size:12px;letter-spacing:.08em;text-transform:uppercase;opacity:.82;transition:opacity .8s ease;pointer-events:none;white-space:nowrap;}
    #hint.hide{opacity:0}
    #loading{position:absolute;inset:0;z-index:20;display:grid;place-items:center;background:linear-gradient(135deg,#f9fdff,#dff0f8);color:rgba(45,63,80,.72);font-size:13px;letter-spacing:.12em;text-transform:uppercase;transition:opacity .45s ease,visibility .45s ease;}
    #loading.hide{opacity:0;visibility:hidden}
    @media (max-width:720px){.topcopy{display:none}#snapshot{right:14px;bottom:14px;padding:10px 14px;font-size:12px}#speaker{left:14px;bottom:14px;width:50px;height:50px}#hint{bottom:62px;font-size:10px}}
  </style>
</head>
<body>
  <main id="stage" aria-label="Interactive pastel flower water with flowing koi that enter and leave the frame">
    <canvas id="water"></canvas>
    <canvas id="fish"></canvas>
    <canvas id="ripples"></canvas>
    <canvas id="caustics"></canvas>
    <canvas id="sparkles"></canvas>
    <div class="vignette"></div>
    <section class="topcopy">
      <p class="eyebrow">ふれてみて · touch the water</p>
      <h1>Eau de Printemps</h1>
      <p class="sub">Ultra-HD pastel water with smooth optimized koi, soft music, and elegant responsive ripples.</p>
    </section>
    <button id="speaker" type="button" aria-label="Turn music on" title="Music on/off"></button>
    <button id="snapshot" type="button">snapshot</button>
    <audio id="bgm" preload="auto" loop playsinline>
      <source src="assets/river-flows-on-you.mp3" type="audio/mpeg">
    </audio>
    <div id="hint">klik tombol speaker untuk menyalakan musik</div>
    <div id="loading">loading ultra hd water garden</div>
  </main>

  <script>
  (() => {
    'use strict';

    const IMG_SRC = 'assets/flower-water-ultrahd-1920x1080.jpg';
    const TAU = Math.PI * 2;
    const stage = document.getElementById('stage');
    const snapshotBtn = document.getElementById('snapshot');
    const speakerBtn = document.getElementById('speaker');
    const bgm = document.getElementById('bgm');
    const hint = document.getElementById('hint');
    const loading = document.getElementById('loading');

    const canvases = {
      water: document.getElementById('water'),
      fish: document.getElementById('fish'),
      ripples: document.getElementById('ripples'),
      caustics: document.getElementById('caustics'),
      sparkles: document.getElementById('sparkles')
    };
    const ctx = {
      water: canvases.water.getContext('2d', { alpha: false }),
      fish: canvases.fish.getContext('2d', { alpha: true }),
      ripples: canvases.ripples.getContext('2d', { alpha: true }),
      caustics: canvases.caustics.getContext('2d', { alpha: true }),
      sparkles: canvases.sparkles.getContext('2d', { alpha: true })
    };

    const isTouch = matchMedia('(pointer: coarse)').matches;
    const prefersReduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const rand = (a, b) => a + Math.random() * (b - a);
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const lerp = (a, b, t) => a + (b - a) * t;
    const smoothStep = t => t * t * (3 - 2 * t);

    const state = {
      w: 1, h: 1, dpr: 1, time: 0, ready: false,
      fit: { dx: 0, dy: 0, dw: 1, dh: 1, scale: 1 },
      pointer: { x: 0, y: 0, px: 0, py: 0, vx: 0, vy: 0, speed: 0, energy: 0, active: false, moved: false, lastMove: 0, lastRipple: 0, lastSparkle: 0 },
      ripples: [], sparkles: [], fish: [], caustics: [], sprites: new Map(),
      frameSkip: 0,
      ambientRippleTimer: 1.25,
      ambientRippleRate: .48
    };

    const settings = {
      dprMax: isTouch ? .85 : 1.00,
      waterCell: isTouch ? 80 : 72,
      maxRipples: 16,
      maxSparkles: isTouch ? 42 : 64,
      fishCount: 22
    };

    const img = new Image();
    let fallbackTried = false;
    img.decoding = 'async';
    img.onload = () => {
      state.ready = true;
      resize();
      buildKoiSprites();
      seedFish();
      buildCaustics();
      loading.classList.add('hide');
      requestAnimationFrame(frame);
    };
    img.onerror = () => {
      // Anti-error fallback: if the external background path is missing on GitHub,
      // generate a soft HD pastel-water background so the web experience still runs.
      if(!fallbackTried){
        fallbackTried = true;
        const fb = document.createElement('canvas');
        fb.width = 1920; fb.height = 1080;
        const fc = fb.getContext('2d');
        const g = fc.createRadialGradient(1050,360,80,960,540,1040);
        g.addColorStop(0,'#fbfeff');
        g.addColorStop(.34,'#dff4fb');
        g.addColorStop(.72,'#cbe8f3');
        g.addColorStop(1,'#bcddea');
        fc.fillStyle = g;
        fc.fillRect(0,0,fb.width,fb.height);
        fc.globalCompositeOperation = 'screen';
        fc.lineCap = 'round';
        for(let k=0;k<90;k++){
          fc.beginPath();
          const x = Math.random()*1920, y = Math.random()*1080;
          const len = 120 + Math.random()*360;
          fc.strokeStyle = `rgba(255,255,255,${0.045+Math.random()*0.10})`;
          fc.lineWidth = .6 + Math.random()*1.6;
          for(let t=0;t<18;t++){
            const a = t/17;
            const px = x + (a-.5)*len;
            const py = y + Math.sin(a*6.283 + k)*22 + Math.cos(a*12.56+k)*8;
            if(t===0) fc.moveTo(px,py); else fc.lineTo(px,py);
          }
          fc.stroke();
        }
        img.src = fb.toDataURL('image/jpeg', .92);
        return;
      }
      loading.textContent = 'background gagal dimuat — upload ulang ZIP lengkap atau ganti index.html';
      loading.style.background = 'linear-gradient(135deg,#f9fdff,#dff0f8)';
    };
    img.src = IMG_SRC;

    function resizeCanvas(canvas, c) {
      canvas.width = Math.round(state.w * state.dpr);
      canvas.height = Math.round(state.h * state.dpr);
      canvas.style.width = state.w + 'px';
      canvas.style.height = state.h + 'px';
      c.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
    }

    function updateFit() {
      const scale = Math.max(state.w / img.naturalWidth, state.h / img.naturalHeight);
      state.fit.scale = scale;
      state.fit.dw = img.naturalWidth * scale;
      state.fit.dh = img.naturalHeight * scale;
      state.fit.dx = (state.w - state.fit.dw) * .5;
      state.fit.dy = (state.h - state.fit.dh) * .5;
    }

    function resize() {
      const r = stage.getBoundingClientRect();
      state.w = Math.max(1, r.width);
      state.h = Math.max(1, r.height);
      state.dpr = Math.min(window.devicePixelRatio || 1, settings.dprMax);
      Object.entries(canvases).forEach(([k, c]) => resizeCanvas(c, ctx[k]));
      if (state.ready) updateFit();
      buildCaustics();
      for (const f of state.fish) {
        f.x = clamp(f.x, 50, state.w - 50);
        f.y = clamp(f.y, 50, state.h - 50);
      }
      if (!state.pointer.moved) {
        state.pointer.x = state.pointer.px = state.w * .52;
        state.pointer.y = state.pointer.py = state.h * .52;
      }
    }
    window.addEventListener('resize', resize, { passive: true });

    function imageRectFromDest(x, y, w, h) {
      const f = state.fit;
      let sx = (x - f.dx) / f.scale;
      let sy = (y - f.dy) / f.scale;
      let sw = w / f.scale;
      let sh = h / f.scale;
      if (sx < 0) { sw += sx; sx = 0; }
      if (sy < 0) { sh += sy; sy = 0; }
      if (sx + sw > img.naturalWidth) sw = img.naturalWidth - sx;
      if (sy + sh > img.naturalHeight) sh = img.naturalHeight - sy;
      if (sw <= 0 || sh <= 0) return null;
      return { sx, sy, sw, sh };
    }

    function drawBaseWater() {
      const c = ctx.water;
      c.clearRect(0, 0, state.w, state.h);
      c.imageSmoothingEnabled = true;
      c.imageSmoothingQuality = 'high';
      c.filter = 'saturate(1.07) contrast(1.05) brightness(1.015)';
      c.drawImage(img, state.fit.dx, state.fit.dy, state.fit.dw, state.fit.dh);
      c.filter = 'none';
    }

    function drawDisplacementZone(cx, cy, radius, strength, now, seed, ringRadius = 0) {
      if (strength <= .015 || radius <= 6) return;
      const c = ctx.water;
      const cell = settings.waterCell;
      const left = Math.max(-cell, cx - radius);
      const top = Math.max(-cell, cy - radius);
      const right = Math.min(state.w + cell, cx + radius);
      const bottom = Math.min(state.h + cell, cy + radius);
      const maxShift = isTouch ? 7 : 10;
      c.save();
      c.globalCompositeOperation = 'source-over';
      c.imageSmoothingQuality = 'high';
      for (let y = top; y < bottom; y += cell) {
        for (let x = left; x < right; x += cell) {
          const px = x + cell * .5, py = y + cell * .5;
          const dx = px - cx, dy = py - cy;
          const d = Math.hypot(dx, dy);
          if (d > radius) continue;
          const a = Math.atan2(dy, dx);
          const fall = 1 - d / radius;
          let envelope = smoothStep(fall);
          if (ringRadius > 0) {
            const band = Math.exp(-Math.pow((d - ringRadius) / 34, 2));
            envelope = Math.max(envelope * .20, band);
          }
          const organic = 1 + .20 * Math.sin(a * 5.1 + seed) + .12 * Math.sin(a * 9.3 + now * .002);
          const wave = Math.sin(d * .12 - now * .0062 + seed) * envelope * strength * organic;
          const tangent = Math.sin(d * .06 + now * .0027 + seed) * envelope * strength * .45;
          const sx = clamp(Math.cos(a) * wave * maxShift - Math.sin(a) * tangent * maxShift, -maxShift, maxShift);
          const sy = clamp(Math.sin(a) * wave * maxShift + Math.cos(a) * tangent * maxShift, -maxShift, maxShift);
          if (Math.abs(sx) + Math.abs(sy) < .45) continue;
          const pad = 2.2;
          const src = imageRectFromDest(x - pad, y - pad, cell + pad * 2, cell + pad * 2);
          if (!src) continue;
          c.globalAlpha = clamp(.18 + Math.abs(wave) * .70, .16, .78);
          c.drawImage(img, src.sx, src.sy, src.sw, src.sh, x - pad + sx, y - pad + sy, src.sw * state.fit.scale, src.sh * state.fit.scale);
        }
      }
      c.restore();
    }

    function drawWater(now) {
      // Ultra-smooth mode: the HD water background is rendered by CSS, not redrawn on canvas.
      // This removes the heaviest per-frame image distortion work and keeps animation smooth.
    }


    const profiles = [
      {name:'Kohaku',base:'#fff7ee',colors:['#ef342d'],fins:'#c9eaf2',pattern:'kohaku'},
      {name:'Showa',base:'#fff8f1',colors:['#ed332d','#18202a'],fins:'#d8e6f2',pattern:'showa'},
      {name:'Sanke',base:'#fff8ef',colors:['#f13b2d','#111923'],fins:'#d9e7f4',pattern:'sanke'},
      {name:'Shiro',base:'#f8ffff',colors:['#101923','#caedf4'],fins:'#c7edf4',pattern:'shiro'},
      {name:'Asagi',base:'#dceef6',colors:['#547a96','#f05d43'],fins:'#b6d9e7',pattern:'asagi'},
      {name:'Yamabuki Ogon',base:'#ffd54e',colors:['#ffe88c','#d89413'],fins:'#ffe19e',pattern:'ogon'},
      {name:'Goshiki',base:'#263c4a',colors:['#ef352c','#eef8fb'],fins:'#a9c4cf',pattern:'goshiki'},
      {name:'Tancho Showa',base:'#f7fbff',colors:['#e6352f','#162232'],fins:'#d9e6f4',pattern:'tanchoShowa'},
      {name:'Ochiba',base:'#f4ebe0',colors:['#cf7b38','#b56731','#d9a56a'],fins:'#dfd1c7',pattern:'ochiba'},
      {name:'Shusui',base:'#f7fbff',colors:['#2c627d','#e94a3d'],fins:'#cbdce9',pattern:'shusui'},
      {name:'Kujaku',base:'#eaf5fb',colors:['#db3d33','#4e6678','#f28a3a'],fins:'#c7dce9',pattern:'kujaku'},
      {name:'Goromo',base:'#fff8f5',colors:['#8e244c','#cd3750'],fins:'#dfd6e8',pattern:'goromo'},
      {name:'Hi Utsuri',base:'#151014',colors:['#f13a2f','#e52323'],fins:'#33252a',pattern:'hiUtsuri'},
      {name:'Ki Utsuri',base:'#151412',colors:['#f4ce34','#ffdf5c'],fins:'#312c20',pattern:'kiUtsuri'},
      {name:'Chagoi',base:'#c77f2f',colors:['#e0a34b','#8f5728'],fins:'#dcaa5f',pattern:'chagoi'},
      {name:'Beni Kumonryu',base:'#fff8f7',colors:['#181f29','#e63532'],fins:'#dbe8ef',pattern:'beniKumonryu'},
      {name:'Tancho',base:'#f8fbff',colors:['#ef342e'],fins:'#e3ebf5',pattern:'tancho'},
      {name:'Kin Showa',base:'#1d2528',colors:['#e23a33','#f4f7f7'],fins:'#74878f',pattern:'kinShowa'},
      {name:'Gin Matsuba',base:'#e5eef5',colors:['#283d56','#ffffff'],fins:'#d4e2ef',pattern:'ginMatsuba'},
      {name:'Kumonryu',base:'#f4fbff',colors:['#14202d','#d9edf5'],fins:'#cae4ef',pattern:'kumonryu'}
    ];

    function bodyPath(c, len, wid) {
      c.beginPath();
      c.moveTo(len * .50, 0);
      c.bezierCurveTo(len * .39, -wid * .56, -len * .17, -wid * .56, -len * .46, -wid * .17);
      c.quadraticCurveTo(-len * .51, 0, -len * .46, wid * .17);
      c.bezierCurveTo(-len * .17, wid * .56, len * .39, wid * .56, len * .50, 0);
      c.closePath();
    }

    function patchList(p) {
      const c = p.colors;
      const dot = (x,y,rx,ry,color,rot=0,a=.88)=>({x,y,rx,ry,color,rot,a});
      switch(p.pattern){
        case 'kohaku': return [dot(-.27,-.05,.17,.34,c[0]),dot(.02,.12,.18,.28,c[0],.25),dot(.28,-.04,.14,.23,c[0],-.2)];
        case 'showa': return [dot(-.28,.07,.22,.35,c[1]),dot(-.05,-.15,.16,.28,c[0],-.25),dot(.13,.12,.16,.27,c[1],.18),dot(.30,-.01,.15,.23,c[0])];
        case 'sanke': return [dot(-.30,-.04,.14,.28,c[0]),dot(-.02,.12,.18,.26,c[0]),dot(.22,-.08,.15,.22,c[0]),dot(.03,-.22,.08,.13,c[1]),dot(.31,.16,.07,.12,c[1])];
        case 'shiro': return [dot(-.28,-.09,.18,.33,c[0]),dot(.02,.14,.18,.29,c[0]),dot(.25,-.12,.14,.23,c[0])];
        case 'asagi': return [dot(.28,0,.11,.2,c[1]),dot(.13,.24,.08,.16,c[1],0,.55),dot(.13,-.24,.08,.16,c[1],0,.55)];
        case 'ogon': return [];
        case 'goshiki': return [dot(-.20,.02,.17,.32,c[0]),dot(.05,-.10,.16,.25,c[0]),dot(.28,.05,.11,.19,c[0])];
        case 'tanchoShowa': return [dot(-.22,.09,.17,.28,c[1]),dot(.04,-.13,.14,.24,c[1],0,.76),dot(.33,0,.12,.19,c[0],0,.95)];
        case 'ochiba': return [dot(-.27,.05,.16,.30,c[0],0,.70),dot(-.03,-.10,.14,.24,c[1],0,.60),dot(.22,.12,.12,.19,c[2],0,.68)];
        case 'shusui': return [dot(.28,0,.10,.18,c[1]),dot(-.18,.22,.10,.19,c[1],0,.60),dot(-.18,-.22,.10,.19,c[1],0,.60)];
        case 'kujaku': return [dot(-.20,.04,.17,.30,c[2],0,.78),dot(.07,-.08,.14,.23,c[0],0,.78),dot(.25,.09,.11,.18,c[0],0,.72)];
        case 'goromo': return [dot(-.28,.08,.17,.32,c[0]),dot(-.02,-.09,.16,.26,c[1],0,.78),dot(.24,.08,.12,.20,c[0],0,.72)];
        case 'hiUtsuri': return [dot(-.27,.06,.20,.34,c[0]),dot(0,-.12,.17,.28,c[1]),dot(.25,.09,.14,.24,c[0],0,.80)];
        case 'kiUtsuri': return [dot(-.25,-.05,.21,.34,c[0]),dot(.04,.13,.18,.28,c[1]),dot(.27,-.07,.14,.23,c[0])];
        case 'chagoi': return [];
        case 'beniKumonryu': return [dot(-.30,.03,.18,.30,c[0]),dot(-.06,-.12,.16,.24,c[1],0,.80),dot(.20,.10,.15,.22,c[0]),dot(.32,-.02,.11,.17,c[1],0,.78)];
        case 'tancho': return [dot(.35,0,.13,.19,c[0],0,.95)];
        case 'kinShowa': return [dot(-.26,.04,.18,.32,c[0]),dot(-.02,-.12,.15,.25,c[1],0,.70),dot(.24,.06,.13,.22,c[0])];
        case 'ginMatsuba': return [];
        case 'kumonryu': return [dot(-.30,-.02,.18,.32,c[0]),dot(.02,.13,.17,.28,c[0]),dot(.24,-.10,.14,.24,c[0])];
        default: return [];
      }
    }

    function drawScaleNet(c, len, wid, color){
      c.save();
      bodyPath(c, len, wid); c.clip();
      c.strokeStyle = color; c.lineWidth = 1;
      for(let x=-len*.36; x<len*.32; x+=8){
        c.beginPath(); c.moveTo(x,-wid*.42); c.quadraticCurveTo(x+5,0,x,wid*.42); c.stroke();
      }
      for(let y=-wid*.30; y<=wid*.30; y+=5){
        c.beginPath(); c.moveTo(-len*.40,y); c.quadraticCurveTo(-len*.03,y+1.2,len*.36,y*.65); c.stroke();
      }
      c.restore();
    }

    function makeSprite(profile){
      // High-clarity illustrated top-view koi sprite.
      // The body is cached once per koi type for performance; animation happens by warping the cached sprite.
      const off = document.createElement('canvas');
      off.width = 260; off.height = 122;
      const c = off.getContext('2d');
      c.translate(off.width/2, off.height/2);
      const len = 160, wid = 38;
      c.imageSmoothingEnabled = true;
      c.imageSmoothingQuality = 'high';

      // Soft shadow inside sprite, keeps fish visible over bright water.
      c.save();
      c.globalAlpha = .045;
      c.fillStyle = 'rgba(42,76,92,.28)';
      c.translate(-len*.01, wid*.035);
      bodyPath(c,len,wid); c.fill();
      c.restore();

      const g = c.createLinearGradient(-len*.52,-wid*.42,len*.52,wid*.42);
      g.addColorStop(0, shade(profile.base, .92));
      g.addColorStop(.18, profile.base);
      g.addColorStop(.43, 'rgba(255,255,255,.98)');
      g.addColorStop(.70, profile.base);
      g.addColorStop(1, shade(profile.base, .86));
      c.fillStyle = g;
      c.strokeStyle = 'rgba(48,74,88,.16)';
      c.lineWidth = 1.10;
      bodyPath(c,len,wid); c.fill(); c.stroke();

      // Dorsal center ridge for a more fish-like, drawn look.
      c.save();
      bodyPath(c,len,wid); c.clip();
      const ridge = c.createLinearGradient(-len*.42,0,len*.45,0);
      ridge.addColorStop(0,'rgba(45,62,75,.10)');
      ridge.addColorStop(.30,'rgba(255,255,255,.10)');
      ridge.addColorStop(.70,'rgba(40,60,78,.12)');
      ridge.addColorStop(1,'rgba(255,255,255,.22)');
      c.strokeStyle = ridge;
      c.lineWidth = 2.1;
      c.beginPath(); c.moveTo(-len*.40,0); c.quadraticCurveTo(-len*.05,-wid*.045,len*.43,0); c.stroke();

      // Subtle scale texture for every koi so the fish read clearly as an illustration.
      const scaleColor = ['asagi','shusui','kujaku','ginMatsuba','chagoi','ogon'].includes(profile.pattern)
        ? 'rgba(26,47,64,.25)' : 'rgba(66,86,96,.10)';
      drawScaleNet(c,len,wid, scaleColor);
      c.restore();

      // Pattern patches, clipped to body.
      c.save(); bodyPath(c,len,wid); c.clip();
      for(const p of patchList(profile)){
        c.save(); c.translate(p.x*len,p.y*wid); c.rotate(p.rot); c.globalAlpha=p.a;
        const rg = c.createRadialGradient(-p.rx*len*.18,-p.ry*wid*.18,0,0,0,p.rx*len*1.12);
        rg.addColorStop(0, saturatePatch(p.color, 1.08));
        rg.addColorStop(.58, p.color);
        rg.addColorStop(.86, p.color);
        rg.addColorStop(1,'rgba(255,255,255,.02)');
        c.fillStyle=rg;
        c.beginPath();
        c.ellipse(0,0,p.rx*len,p.ry*wid,Math.sin(p.x*4.7)*.28,0,TAU);
        c.fill();
        // Ink-like thin boundary makes pattern clearer without cartoon outline.
        c.globalAlpha = Math.min(.22, p.a*.26);
        c.strokeStyle = 'rgba(42,47,52,.65)';
        c.lineWidth = 1.0;
        c.stroke();
        c.restore();
      }
      c.restore();

      // Special tancho head circle refinement.
      if(profile.pattern === 'tancho' || profile.pattern === 'tanchoShowa'){
        c.save(); bodyPath(c,len,wid); c.clip();
        c.globalAlpha = .93; c.fillStyle = '#ef342e';
        c.beginPath(); c.ellipse(len*.35,0,len*.105,wid*.18,0,0,TAU); c.fill();
        c.restore();
      }

      // Gloss and top-down water sheen.
      const shine = c.createRadialGradient(len*.30,-wid*.13,0,len*.30,-wid*.13,len*.42);
      shine.addColorStop(0,'rgba(255,255,255,.26)');
      shine.addColorStop(.55,'rgba(255,255,255,.10)');
      shine.addColorStop(1,'rgba(255,255,255,0)');
      c.fillStyle=shine; bodyPath(c,len,wid); c.fill();
      c.globalCompositeOperation='screen';
      c.strokeStyle='rgba(255,255,255,.36)'; c.lineWidth=1.5;
      c.beginPath(); c.moveTo(-len*.33,-wid*.18); c.quadraticCurveTo(-len*.05,-wid*.31,len*.37,-wid*.08); c.stroke();
      c.globalCompositeOperation='source-over';

      // Eyes.
      c.fillStyle='rgba(22,31,39,.82)';
      c.beginPath(); c.arc(len*.37,-wid*.21,2.35,0,TAU); c.arc(len*.37,wid*.21,2.35,0,TAU); c.fill();
      c.fillStyle='rgba(255,255,255,.72)';
      c.beginPath(); c.arc(len*.378,-wid*.222,.75,0,TAU); c.arc(len*.378,wid*.198,.75,0,TAU); c.fill();

      return off;
    }

    function shade(hex, amt){
      const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      if(!m) return hex;
      const r = Math.round(parseInt(m[1],16)*amt), g = Math.round(parseInt(m[2],16)*amt), b = Math.round(parseInt(m[3],16)*amt);
      return `rgb(${clamp(r,0,255)},${clamp(g,0,255)},${clamp(b,0,255)})`;
    }
    function saturatePatch(hex, factor){
      const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      if(!m) return hex;
      let r=parseInt(m[1],16), g=parseInt(m[2],16), b=parseInt(m[3],16);
      const avg=(r+g+b)/3;
      r=Math.round(avg+(r-avg)*factor); g=Math.round(avg+(g-avg)*factor); b=Math.round(avg+(b-avg)*factor);
      return `rgb(${clamp(r,0,255)},${clamp(g,0,255)},${clamp(b,0,255)})`;
    }

    function buildKoiSprites(){
      state.sprites.clear();
      for(const p of profiles) state.sprites.set(p.name, makeSprite(p));
    }

    function randomEdgeSpawn(size){
      const buffer = Math.max(90, size * 7.5);
      const edge = Math.floor(rand(0,4));
      let x, y, angle;
      if(edge === 0){
        x = -rand(size*3.0, buffer); y = rand(-buffer*.45, state.h + buffer*.45); angle = rand(-.28,.28);
      } else if(edge === 1){
        x = state.w + rand(size*3.0, buffer); y = rand(-buffer*.45, state.h + buffer*.45); angle = Math.PI + rand(-.28,.28);
      } else if(edge === 2){
        x = rand(-buffer*.45, state.w + buffer*.45); y = -rand(size*3.0, buffer); angle = Math.PI/2 + rand(-.28,.28);
      } else {
        x = rand(-buffer*.45, state.w + buffer*.45); y = state.h + rand(size*3.0, buffer); angle = -Math.PI/2 + rand(-.28,.28);
      }
      return { x, y, angle };
    }

    function resetFishFromEdge(f, soft=false){
      const pos = randomEdgeSpawn(f.size || 14);
      f.x = pos.x; f.y = pos.y;
      f.angle = pos.angle;
      f.targetAngle = pos.angle + rand(-.22,.22);
      f.wanderAngle = f.targetAngle;
      f.speed = f.baseSpeed * rand(.78,1.08);
      f.targetSpeed = f.baseSpeed * rand(.86,1.18);
      f.turnTimer = rand(1.8,4.8);
      f.trailTimer = rand(1.2,3.6);
      f.moodTimer = rand(1.8,4.8);
      f.speedMood = 1;
      f.panic = soft ? f.panic*.35 : 0;
      f.panicEnergy = 0;
      f.fleeX = Math.cos(f.angle);
      f.fleeY = Math.sin(f.angle);
      f.outsideAge = 0;
    }

    function seedFish(){
      state.fish.length = 0;
      for(let i=0;i<settings.fishCount;i++){
        const profile = profiles[i % profiles.length];
        const size = rand(isTouch?9.2:11.2, isTouch?15.0:18.4) * (profile.pattern==='chagoi'?1.06:1);
        const baseSpeed = rand(isTouch?12:15, isTouch?24:38);
        const initial = Math.random() < .62 ? randomEdgeSpawn(size) : {
          x: rand(-state.w*.08,state.w*1.08),
          y: rand(-state.h*.08,state.h*1.08),
          angle: rand(0, TAU)
        };
        const fish = {
          profile, sprite: state.sprites.get(profile.name),
          x: initial.x, y: initial.y,
          angle: initial.angle, targetAngle: initial.angle + rand(-.35,.35),
          vx: Math.cos(initial.angle)*baseSpeed, vy: Math.sin(initial.angle)*baseSpeed,
          speed: baseSpeed * rand(.78,1.16), targetSpeed: baseSpeed, baseSpeed, maxSpeed: baseSpeed*3.8,
          size,
          phase: rand(0,TAU), sway: rand(.82,1.18), tail: rand(.82,1.22),
          wanderAngle: initial.angle + rand(-.32,.32), wanderPhase: rand(0,TAU), wanderTimer: rand(1.8,5.8),
          turnTimer: rand(1.4,5.4), turnBias: rand(-.10,.10),
          trailTimer: rand(1.4,4.2), moodTimer: rand(1.8,5.6), speedMood: rand(.92,1.08), panic: 0, panicEnergy: 0, fleeX: Math.cos(initial.angle), fleeY: Math.sin(initial.angle),
          turnWobble: 0, depth: rand(.58,.76), layer: rand(0,1), outsideAge: 0
        };
        state.fish.push(fish);
      }
    }

    function shortestAngle(a,b){
      let d = ((b - a + Math.PI) % TAU) - Math.PI;
      if (d < -Math.PI) d += TAU;
      return d;
    }
    function angleLerp(a,b,t){ return a + shortestAngle(a,b) * t; }
    function rotateTowards(a,b,maxStep){
      const d = shortestAngle(a,b);
      return a + clamp(d, -maxStep, maxStep);
    }

    function scareFish(x, y, power=1){
      if(!state.fish.length) return;
      const radius = Math.min(Math.max(state.w,state.h)*.46, 760);
      for(const f of state.fish){
        const dx = f.x - x, dy = f.y - y;
        const dist = Math.max(1, Math.hypot(dx,dy));
        const hit = clamp(1 - dist / radius, 0, 1);
        if(hit <= 0) continue;
        const organic = rand(-.28,.28);
        const fleeAngle = Math.atan2(dy,dx) + organic + Math.sin(f.phase)*.13;
        const impulse = Math.pow(hit, .52) * power;
        f.fleeX = Math.cos(fleeAngle);
        f.fleeY = Math.sin(fleeAngle);
        f.targetAngle = fleeAngle + rand(-.12,.12);
        f.wanderAngle = f.targetAngle;
        f.panic = Math.max(f.panic, .88 + impulse*1.55);
        f.panicEnergy = Math.max(f.panicEnergy, impulse);
        f.targetSpeed = Math.max(f.targetSpeed, f.baseSpeed + 54 + impulse*74);
        f.turnTimer = rand(.28,.80);
        f.phase += rand(.55,1.55);
        f.trailTimer = Math.min(f.trailTimer, rand(.04,.16));
        if(!prefersReduced && impulse > .18){
          addRipple(f.x - f.fleeX*f.size*1.8, f.y - f.fleeY*f.size*1.8, .18 + impulse*.30, 'trail');
          if(Math.random()<.72) makeSparkle(f.x+rand(-f.size,f.size), f.y+rand(-f.size,f.size), .48);
        }
      }
    }

    function updateFish(dt, now){
      const p = state.pointer;
      const pointerAge = (now - p.lastMove)/1000;
      const centerX = state.w*.5, centerY = state.h*.5;
      const exitBuffer = Math.max(170, Math.min(state.w,state.h)*.18);
      const softOutside = Math.max(72, Math.min(state.w,state.h)*.065);

      for(let i=0;i<state.fish.length;i++){
        const f = state.fish[i];
        f.trailTimer -= dt;
        f.turnTimer -= dt;
        f.moodTimer -= dt;
        f.phase += dt * (2.15 + f.speed*.11 + f.panic*1.70) * f.sway;

        if(f.moodTimer <= 0){
          const pick = Math.random();
          if(pick < .24){
            f.speedMood = rand(.62,.78);     // slow glide
            f.moodTimer = rand(2.6,5.2);
          } else if(pick < .82){
            f.speedMood = rand(.92,1.08);    // normal cruise
            f.moodTimer = rand(1.8,4.0);
          } else {
            f.speedMood = rand(1.18,1.36);   // slightly faster burst
            f.moodTimer = rand(.9,1.9);
          }
          f.targetSpeed = Math.max(f.baseSpeed*.55, f.baseSpeed * f.speedMood);
        }

        const farOutside = f.x < -exitBuffer*1.6 || f.x > state.w + exitBuffer*1.6 || f.y < -exitBuffer*1.6 || f.y > state.h + exitBuffer*1.6;
        if(farOutside){
          resetFishFromEdge(f, true);
          continue;
        }

        // Fish move forward continuously; the heading changes only through slow, occasional turns.
        if(f.turnTimer <= 0){
          const gentleTurn = Math.random() < .18 ? rand(-.92,.92) : rand(-.42,.42);
          f.targetAngle = f.angle + gentleTurn + Math.sin(now*.00017 + f.wanderPhase)*.22 + f.turnBias;
          f.targetSpeed = f.baseSpeed * rand(.82,1.24);
          f.turnTimer = rand(1.8,6.4);
          if(Math.random() < .22) f.turnBias = rand(-.12,.12);
        }
        f.targetAngle += Math.sin(now*.00019 + f.wanderPhase) * dt * .13;

        let vx = Math.cos(f.targetAngle);
        let vy = Math.sin(f.targetAngle);

        // Outside the visible pond, gently guide koi back in from beyond the frame.
        const isOutside = f.x < -softOutside || f.x > state.w + softOutside || f.y < -softOutside || f.y > state.h + softOutside;
        if(isOutside){
          f.outsideAge += dt;
          const toCenter = Math.atan2(centerY - f.y, centerX - f.x);
          const pull = clamp(.14 + f.outsideAge*.055, .14, .38);
          vx = lerp(vx, Math.cos(toCenter), pull);
          vy = lerp(vy, Math.sin(toCenter), pull);
          f.targetSpeed = Math.max(f.targetSpeed, f.baseSpeed*.96);
        } else {
          f.outsideAge = 0;
        }

        // Gentle interaction between fish: separation, slight alignment, and loose schooling.
        let sx=0, sy=0, ax=0, ay=0, cx=0, cy=0, socialCount=0;
        for(let j=0;j<state.fish.length;j++){
          if(i===j) continue;
          const o=state.fish[j], dx=f.x-o.x, dy=f.y-o.y, d2=dx*dx+dy*dy;
          const safe = (f.size + o.size) * 2.45;
          if(d2>1 && d2<safe*safe){
            const d=Math.sqrt(d2), q=Math.pow(1-d/safe,2)*.44;
            sx += dx/d*q; sy += dy/d*q;
          }
          const socialRange = Math.max(120, (f.size + o.size) * 6.8);
          if(d2 < socialRange*socialRange){
            const d = Math.sqrt(Math.max(1,d2));
            const w = 1 - d / socialRange;
            ax += Math.cos(o.angle) * w;
            ay += Math.sin(o.angle) * w;
            cx += o.x * w;
            cy += o.y * w;
            socialCount += w;
          }
        }
        vx += sx; vy += sy;
        if(socialCount > .001){
          const avgAngle = Math.atan2(ay, ax);
          const alignForce = clamp(socialCount * .045, 0, .14);
          vx = lerp(vx, Math.cos(avgAngle), alignForce);
          vy = lerp(vy, Math.sin(avgAngle), alignForce);
          const centerXSocial = cx / socialCount;
          const centerYSocial = cy / socialCount;
          const cohX = centerXSocial - f.x;
          const cohY = centerYSocial - f.y;
          const cohD = Math.hypot(cohX, cohY);
          if(cohD > f.size * 3.2){
            const cohesionForce = clamp((cohD / 160) * .035, 0, .055);
            vx += (cohX / cohD) * cohesionForce;
            vy += (cohY / cohD) * cohesionForce;
          }
          // Occasionally match neighbor pace a little for more natural interaction.
          const neighborMood = clamp(1 + (socialCount * .01), .98, 1.08);
          f.targetSpeed = lerp(f.targetSpeed, Math.max(f.baseSpeed*.55, f.baseSpeed * f.speedMood * neighborMood), .018);
        }

        // Cursor proximity: ikan menghindar lembut. Click/tap uses scareFish() and makes them kabur.
        let pointerForce = 0;
        if(p.moved && pointerAge < 1.45){
          const dx=f.x-p.x, dy=f.y-p.y, dist=Math.max(1,Math.hypot(dx,dy));
          const avoid=125 + f.size*3.4;
          if(dist < avoid){
            pointerForce = Math.pow(1-dist/avoid,1.48) * clamp(p.energy,.16,1.45);
            vx += (dx/dist)*(1.00 + pointerForce*2.10);
            vy += (dy/dist)*(1.00 + pointerForce*2.10);
          }
        }

        if(f.panic > .001){
          vx += f.fleeX * (2.7 + f.panic*3.25);
          vy += f.fleeY * (2.7 + f.panic*3.25);
        }

        const desiredAngle = Math.atan2(vy, vx);
        const targetSpeed = clamp(
          f.targetSpeed + pointerForce*24 + f.panic*58 + Math.sin(f.phase*.31)*1.4,
          f.baseSpeed*.50,
          f.baseSpeed * 1.55 + 46
        );

        // Smooth realistic steering: limited heading change prevents patah-patah direction.
        const turnRate = (f.panic > .18 ? 1.95 + f.panic*1.35 : .38 + f.speed*.010) * dt;
        const before = f.angle;
        f.angle = rotateTowards(f.angle, desiredAngle, turnRate);
        const turnAmount = shortestAngle(before, f.angle) / Math.max(dt,.001);
        f.turnWobble = lerp(f.turnWobble, clamp(turnAmount*.044, -.50, .50), 1-Math.exp(-dt*4.2));

        const speedEase = 1 - Math.exp(-dt*(.92 + f.panic*3.9));
        f.speed = lerp(f.speed, targetSpeed, speedEase);
        f.speed = clamp(f.speed, f.baseSpeed*.46, f.baseSpeed * 1.58 + 50);

        // Forward swimming with tiny body sway, like a top-view koi gliding through shallow water.
        const side = f.angle + Math.PI/2;
        const bodyWave = Math.sin(f.phase) * f.size * (.018 + f.panic*.010);
        f.x += Math.cos(f.angle)*f.speed*dt + Math.cos(side)*bodyWave;
        f.y += Math.sin(f.angle)*f.speed*dt + Math.sin(side)*bodyWave;

        f.panic *= Math.exp(-dt*1.55);
        f.panicEnergy *= Math.exp(-dt*1.25);
        f.fleeX = lerp(f.fleeX, Math.cos(f.targetAngle), dt*.09);
        f.fleeY = lerp(f.fleeY, Math.sin(f.targetAngle), dt*.09);

        if(!prefersReduced && f.trailTimer <= 0){
          const wakeStrength = .042 + f.speed*.00105 + f.panic*.026;
          addRipple(f.x - Math.cos(f.angle)*f.size*2.7, f.y - Math.sin(f.angle)*f.size*2.7, wakeStrength, 'trail');
          if(Math.random() < (.16 + f.panic*.11)) makeSparkle(f.x+rand(-f.size*.8,f.size*.8), f.y+rand(-f.size*.8,f.size*.8), .22 + f.panic*.07);
          f.trailTimer = f.panic>.25 ? rand(.28,.62) : rand(3.8,7.6);
        }
      }
    }

    function drawTailAndFins(c, f){
      // Tail only: no side pectoral fins, so koi do not look like they have hands.
      const s = f.size;
      const wag = Math.sin(f.phase)*.46*f.tail;
      c.save();
      c.globalAlpha = f.depth*.52;
      c.fillStyle = f.profile.fins;
      c.strokeStyle = 'rgba(255,255,255,.30)';
      c.lineWidth = Math.max(.45,s*.026);
      c.translate(-s*2.13, 0);
      c.rotate(wag);
      c.beginPath();
      c.moveTo(0,0);
      c.quadraticCurveTo(-s*.66,-s*.42,-s*1.06,-s*.17);
      c.quadraticCurveTo(-s*.56,-s*.02,0,0);
      c.fill(); c.stroke();
      c.beginPath();
      c.moveTo(0,0);
      c.quadraticCurveTo(-s*.66,s*.42,-s*1.06,s*.17);
      c.quadraticCurveTo(-s*.56,s*.02,0,0);
      c.fill(); c.stroke();
      c.restore();
    }

    function drawFish(now){
      const c = ctx.fish;
      c.clearRect(0,0,state.w,state.h);
      c.save();
      c.imageSmoothingEnabled = true;
      c.imageSmoothingQuality = 'high';
      c.globalCompositeOperation = 'source-over';
      const sorted = state.fish.slice().sort((a,b)=>a.depth-b.depth);
      for(const f of sorted){
        const s=f.size;
        c.save();
        c.translate(f.x,f.y);
        c.rotate(f.angle + Math.sin(f.phase*.42)*.012);
        c.globalAlpha = f.depth * .86;
        // No surface-like drop shadow: koi should read as below the water, not floating on top.
        const sh = c.createRadialGradient(-s*.2,s*.13,0,-s*.2,s*.13,s*2.9);
        sh.addColorStop(0,'rgba(42,105,126,.040)'); sh.addColorStop(.72,'rgba(42,105,126,.012)'); sh.addColorStop(1,'rgba(42,105,126,0)');
        c.fillStyle = sh; c.beginPath(); c.ellipse(-s*.08,s*.13,s*1.82,s*.54,0,0,TAU); c.fill();
        drawTailAndFins(c,f);
        const wag = Math.sin(f.phase)*(.016 + f.panic*.004) + (f.turnWobble||0)*.018;
        c.transform(1, wag, 0, 1 + Math.sin(f.phase*.5)*.012, 0, 0);
        c.drawImage(f.sprite, -s*2.28, -s*1.08, s*4.56, s*2.16);
        c.restore();
      }
      // A transparent aqua veil is composited only over existing fish pixels.
      // This makes the koi feel submerged while preserving color and pattern clarity.
      c.globalCompositeOperation = 'source-atop';
      const waterVeil = c.createLinearGradient(0,0,state.w,state.h);
      waterVeil.addColorStop(0,'rgba(184,235,246,.22)');
      waterVeil.addColorStop(.45,'rgba(222,250,255,.13)');
      waterVeil.addColorStop(1,'rgba(126,210,232,.20)');
      c.fillStyle = waterVeil;
      c.fillRect(0,0,state.w,state.h);

      c.globalCompositeOperation='screen';
      for(const f of sorted){
        const gl=.017+.012*Math.sin(now*.002+f.phase);
        const g=c.createRadialGradient(f.x,f.y,0,f.x,f.y,f.size*2.6);
        g.addColorStop(0,`rgba(255,255,255,${gl})`); g.addColorStop(.70,'rgba(185,244,255,.012)'); g.addColorStop(1,'rgba(255,255,255,0)');
        c.fillStyle=g; c.beginPath(); c.arc(f.x,f.y,f.size*2.6,0,TAU); c.fill();
      }
      c.restore();
    }

    function addRipple(x,y,strength=1,kind='move'){
      if(prefersReduced) return;
      state.ripples.push({
        x, y, birth: performance.now(),
        radius: kind==='splash'?8:(kind==='ambient'?5:3),
        speed: kind==='splash'?rand(86,112):(kind==='ambient'?rand(62,82):rand(38,58)),
        max: kind==='splash'?rand(220,300):kind==='ambient'?rand(120,180):kind==='trail'?rand(64,100):rand(120,190),
        amp: strength*(kind==='splash'?1.58:kind==='ambient'?.88:kind==='trail'?.42:.82),
        life: kind==='splash'?2.65:kind==='ambient'?1.85:kind==='trail'?1.35:1.9,
        damping: kind==='splash'?1.30:kind==='ambient'?1.70:2.05,
        seed: rand(0,999)
      });
      if(state.ripples.length > settings.maxRipples) state.ripples.splice(0, state.ripples.length - settings.maxRipples);
    }

    function organicRing(c,x,y,r,alpha,seed,now,width,glow=0){
      const pts = r < 100 ? 42 : 54;
      c.beginPath();
      for(let i=0;i<=pts;i++){
        const a=i/pts*TAU;
        const wob=Math.sin(a*3.2+seed+now*.0013)*1.6 + Math.sin(a*7.1-seed*.3+now*.0016)*.75;
        const rr=r+wob;
        const px=x+Math.cos(a)*rr, py=y+Math.sin(a)*rr;
        if(i===0)c.moveTo(px,py); else c.lineTo(px,py);
      }
      c.closePath();
      c.lineWidth=width;
      c.shadowBlur=glow;
      c.shadowColor=`rgba(255,255,255,${alpha*.75})`;
      c.strokeStyle=`rgba(255,255,255,${alpha})`;
      c.stroke();
      c.shadowBlur=0;
    }

    function drawRipples(now){
      const c=ctx.ripples;
      c.clearRect(0,0,state.w,state.h);
      c.save();
      c.globalCompositeOperation='screen';
      c.lineCap='round';
      c.lineJoin='round';
      for(let i=state.ripples.length-1;i>=0;i--){
        const r=state.ripples[i], age=(now-r.birth)/1000;
        if(age>r.life){ state.ripples.splice(i,1); continue; }
        const radius=r.radius+r.speed*age;
        if(radius>r.max+42){ state.ripples.splice(i,1); continue; }
        const decay=Math.exp(-r.damping*age)*Math.max(0,1-age/r.life);
        const alpha=clamp(decay*r.amp*.42,0,.58);
        if(alpha<.012) continue;
        organicRing(c,r.x,r.y,radius,alpha*.36,r.seed,now,5.0+5.5*decay,8+12*decay);
        organicRing(c,r.x,r.y,radius,alpha,r.seed,now,2.0+2.1*decay,3+4*decay);
        organicRing(c,r.x,r.y,radius+11,alpha*.38,r.seed+4.5,now,1.0+1.1*decay,2+3*decay);
      }
      c.restore();
    }


    function buildCaustics(){
      state.caustics.length=0;
      const count=isTouch?16:24;
      for(let i=0;i<count;i++) state.caustics.push({x:rand(-.1,1.1),y:rand(-.1,1.1),len:rand(.22,.50),amp:rand(6,18),speed:rand(.00018,.00046),phase:rand(0,TAU),thick:rand(.55,1.6),alpha:rand(.05,.16)});
    }

    function drawCaustics(now){
      const c=ctx.caustics;
      c.clearRect(0,0,state.w,state.h);
      c.save(); c.globalCompositeOperation='screen'; c.lineCap='round';
      const p=state.pointer;
      for(const line of state.caustics){
        const driftX=Math.sin(now*line.speed+line.phase)*state.w*.035 + (p.moved?(p.x/state.w-.5)*9*p.energy:0);
        const driftY=Math.cos(now*line.speed*.83+line.phase)*state.h*.030 + (p.moved?(p.y/state.h-.5)*7*p.energy:0);
        const x=line.x*state.w+driftX, y=line.y*state.h+driftY;
        const length=line.len*Math.min(state.w,state.h);
        c.strokeStyle=`rgba(255,255,255,${line.alpha})`; c.lineWidth=line.thick;
        c.beginPath();
        for(let k=0;k<8;k++){
          const t=k/7, xx=x+(t-.5)*length, yy=y+Math.sin(t*TAU+now*.0016+line.phase)*line.amp;
          if(k===0)c.moveTo(xx,yy); else c.lineTo(xx,yy);
        }
        c.stroke();
      }
      c.restore();
    }

    function makeSparkle(x,y,power=.55){
      if(state.sparkles.length > settings.maxSparkles) return;
      state.sparkles.push({x,y,vx:rand(-12,12)*power,vy:rand(-14,8)*power,size:rand(1.1,2.9)*power,life:0,max:rand(.55,1.45),spin:rand(0,TAU),spinV:rand(-3,3),kind:Math.random()<.32?'star':'dot'});
    }
    function spawnSparkles(x,y,n,power=.65){ for(let i=0;i<n;i++) makeSparkle(x+rand(-16,16),y+rand(-16,16),power); }

    function star(c,x,y,r,a,spin){
      c.save(); c.translate(x,y); c.rotate(spin); c.strokeStyle=`rgba(255,255,255,${a})`; c.lineWidth=Math.max(.6,r*.25); c.beginPath(); c.moveTo(-r*2.1,0); c.lineTo(r*2.1,0); c.moveTo(0,-r*2.1); c.lineTo(0,r*2.1); c.stroke(); c.restore();
    }

    function drawSparkles(dt,now){
      const c=ctx.sparkles; c.clearRect(0,0,state.w,state.h); c.save(); c.globalCompositeOperation='screen';
      for(let i=state.sparkles.length-1;i>=0;i--){
        const p=state.sparkles[i]; p.life+=dt;
        if(p.life>=p.max){ state.sparkles.splice(i,1); continue; }
        const age=p.life/p.max, fade=Math.sin(Math.PI*age)*(1-age*.12);
        p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=Math.pow(.90,dt*60); p.vy*=Math.pow(.90,dt*60); p.spin+=p.spinV*dt;
        const tw=.70+.30*Math.sin(now*.014+p.spin*2.2), a=fade*tw*.88;
        const r=p.size*(1+age*.9);
        const g=c.createRadialGradient(p.x,p.y,0,p.x,p.y,r*4);
        g.addColorStop(0,`rgba(255,255,255,${a})`); g.addColorStop(.42,`rgba(219,250,255,${a*.34})`); g.addColorStop(.72,`rgba(255,225,245,${a*.16})`); g.addColorStop(1,'rgba(255,255,255,0)');
        c.fillStyle=g; c.beginPath(); c.arc(p.x,p.y,r*4,0,TAU); c.fill();
        if(p.kind==='star') star(c,p.x,p.y,r,a*.75,p.spin);
      }
      c.restore();
    }

    function updatePointerFromEvent(e){
      const rect=stage.getBoundingClientRect();
      const t=e.touches && e.touches[0] ? e.touches[0] : e;
      const x=clamp(t.clientX-rect.left,0,state.w), y=clamp(t.clientY-rect.top,0,state.h);
      const now=performance.now();
      const p=state.pointer;
      const dt=Math.max(.016,(now-(p.lastMove||now))/1000);
      p.vx=(x-p.x)/dt; p.vy=(y-p.y)/dt; p.speed=Math.hypot(p.vx,p.vy);
      p.px=p.x; p.py=p.y; p.x=x; p.y=y; p.active=true; p.moved=true; p.lastMove=now;
      const energy=clamp(p.speed/950, .06, 1.35);
      p.energy=lerp(p.energy, energy, .42);
      if(now-p.lastRipple > (isTouch?92:72) && p.speed>32){ addRipple(x,y,clamp(p.speed/850,.16,1),'move'); p.lastRipple=now; }
      if(now-p.lastSparkle > 52 && p.speed>70){ spawnSparkles(x,y,Math.min(2,1+Math.floor(p.speed/700)),clamp(p.speed/900,.42,.95)); p.lastSparkle=now; }
      stage.style.setProperty('--mx',(x/state.w*100)+'%'); stage.style.setProperty('--my',(y/state.h*100)+'%');
      if(audio.playing) hint.classList.add('hide');
    }
    stage.addEventListener('pointermove', updatePointerFromEvent, { passive: true });
    stage.addEventListener('pointerdown', e => { updatePointerFromEvent(e); addRipple(state.pointer.x,state.pointer.y,1.75,'splash'); spawnSparkles(state.pointer.x,state.pointer.y,6,1); scareFish(state.pointer.x,state.pointer.y,1.55); }, { passive: true });
    stage.addEventListener('pointerup', () => { state.pointer.active=false; }, { passive: true });

    const audio = { playing: false };

    function renderSpeakerIcon(isOn){
      const waves = isOn
        ? `<path class="speaker-wave" d="M15.8 8.9c1.9 1.2 3 3.2 3 5.1s-1.1 3.9-3 5.1"/>
           <path class="speaker-wave" d="M18.9 6.5c2.6 1.9 4.1 4.8 4.1 7.5s-1.5 5.6-4.1 7.5"/>`
        : `<line class="speaker-mute" x1="17.4" y1="10.2" x2="22.2" y2="17.8"/>
           <line class="speaker-mute" x1="22.2" y1="10.2" x2="17.4" y2="17.8"/>`;
      return `<span class="speaker-shell" aria-hidden="true">
        <svg viewBox="0 0 28 28" role="presentation" focusable="false">
          <path class="speaker-body" d="M4.4 11.4h4.1l5.3-4.5c.6-.5 1.5-.1 1.5.7v12.8c0 .8-.9 1.2-1.5.7l-5.3-4.5H4.4c-.8 0-1.4-.6-1.4-1.4v-2.4c0-.8.6-1.4 1.4-1.4Z"/>
          ${waves}
        </svg>
        <span class="speaker-dot"></span>
      </span>`;
    }
    bgm.volume = 0.42;

    function setSpeakerState(){
      speakerBtn.innerHTML = renderSpeakerIcon(audio.playing);
      speakerBtn.classList.toggle('playing', audio.playing);
      speakerBtn.setAttribute('aria-label', audio.playing ? 'Turn music off' : 'Turn music on');
      speakerBtn.title = audio.playing ? 'Music off' : 'Music on';
    }

    async function toggleMusic(){
      try{
        hint.classList.add('hide');
        if(audio.playing){
          bgm.pause();
          audio.playing = false;
        }else{
          await bgm.play();
          audio.playing = true;
        }
        speakerBtn.classList.remove('error');
      }catch(err){
        audio.playing = false;
        speakerBtn.classList.add('error');
        hint.textContent = 'file musik belum ditemukan: assets/river-flows-on-you.mp3';
        hint.classList.remove('hide');
      }
      setSpeakerState();
    }

    function startMusic(){ /* music is controlled only by the speaker button */ }
    function updateMusic(){ /* real song audio uses <audio>, no realtime synth update needed */ }

    speakerBtn.addEventListener('pointerdown', e => e.stopPropagation(), { passive: true });
    speakerBtn.addEventListener('click', e => { e.stopPropagation(); toggleMusic(); });
    bgm.addEventListener('ended', () => { audio.playing = false; setSpeakerState(); });
    bgm.addEventListener('pause', () => { if(!bgm.ended){ audio.playing = false; setSpeakerState(); } });
    bgm.addEventListener('play', () => { audio.playing = true; setSpeakerState(); });
    setSpeakerState();

    function updateAmbientRipples(dt){
      if(prefersReduced) return;
      state.ambientRippleTimer -= dt;
      if(state.ambientRippleTimer > 0) return;
      const margin = Math.min(state.w,state.h) * .07;
      const x = rand(margin, state.w - margin);
      const y = rand(margin, state.h - margin);
      // Ripple frequency parameter = 0.15 seconds. This is intentionally more frequent
      // than the previous 0.25 setting, but the strength is kept soft and premium.
      addRipple(x, y, rand(.34,.58), 'ambient');
      if(Math.random() < .18) spawnSparkles(x, y, 1, .24);
      state.ambientRippleTimer = rand(state.ambientRippleRate*.72, state.ambientRippleRate*1.55);
    }

    function update(now,dt){
      const p=state.pointer;
      p.energy*=Math.pow(.90,dt*60); p.speed*=Math.pow(.86,dt*60); p.vx*=Math.pow(.88,dt*60); p.vy*=Math.pow(.88,dt*60);
      updateFish(dt,now); updateAmbientRipples(dt); updateMusic();
      if(!prefersReduced && Math.random() < .010 && state.sparkles.length < settings.maxSparkles*.7) makeSparkle(rand(state.w*.08,state.w*.92), rand(state.h*.10,state.h*.90), .28);
    }

    function frame(now){
      const raw=(now-(state.time||now))/1000;
      const dt=clamp(raw || .016, .001, .033);
      state.time=now;
      update(now,dt);
      state.frameSkip = (state.frameSkip + 1) % 4;
      drawFish(now);
      drawRipples(now);
      if(state.frameSkip === 0) drawCaustics(now);
      drawSparkles(dt,now);
      requestAnimationFrame(frame);
    }

    snapshotBtn.addEventListener('pointerdown', e => e.stopPropagation(), { passive: true });
    snapshotBtn.addEventListener('click', e => {
      e.stopPropagation();
      const out=document.createElement('canvas'); out.width=canvases.ripples.width; out.height=canvases.ripples.height;
      const oc=out.getContext('2d');
      oc.fillStyle='#dff0f7'; oc.fillRect(0,0,out.width,out.height);
      const f=state.fit;
      if(state.ready) oc.drawImage(img, f.dx*state.dpr, f.dy*state.dpr, f.dw*state.dpr, f.dh*state.dpr);
      for(const k of ['fish','ripples','caustics','sparkles']) oc.drawImage(canvases[k],0,0);
      out.toBlob(blob => { const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='eau-de-printemps-koi-snapshot.png'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1200); }, 'image/png');
    });

    setTimeout(()=>hint.classList.add('hide'), 7000);
  })();
  </script>
</body>
