<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#e9f7ff" />
  <meta name="description" content="A dreamy pastel flower water ripple web experience with translucent blossoms, sparkling caustic light, and touch-reactive ripples." />
  <title>Eau de Printemps — pastel water ripples</title>
  <link rel="preload" as="image" href="assets/flower-water.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app" aria-label="Interactive pastel water ripple experience">
    <section class="scene" id="scene" aria-label="Dreamy pastel water with floating translucent flowers">
      <img class="water-photo" src="assets/flower-water.png" alt="Dreamy pastel water surface with translucent flowers and shimmering caustic light" />
      <canvas id="waterCanvas" aria-hidden="true"></canvas>
      <div class="soft-vignette" aria-hidden="true"></div>
      <div class="title-card" aria-label="Title">
        <p class="eyebrow">ふれてみて · touch the water</p>
        <h1>Eau de Printemps</h1>
        <p>pastel water ripples</p>
      </div>

      <button class="tune-toggle" id="tuneToggle" type="button" aria-controls="tunePanel" aria-expanded="false">
        <span class="icon">tune</span>
        <span>Tune</span>
      </button>

      <aside class="tune-panel" id="tunePanel" aria-label="Visual controls">
        <label>
          <span>sparkle</span>
          <input id="sparkleRange" type="range" min="0" max="100" value="74" />
        </label>
        <label>
          <span>ripple</span>
          <input id="rippleRange" type="range" min="0" max="100" value="78" />
        </label>
        <label>
          <span>petals</span>
          <input id="petalRange" type="range" min="0" max="100" value="42" />
        </label>
        <label>
          <span>light</span>
          <input id="lightRange" type="range" min="0" max="100" value="72" />
        </label>
        <div class="button-row">
          <button id="restartBtn" type="button" title="Restart ripples">restart_alt</button>
          <button id="cameraBtn" type="button" title="Save snapshot">photo_camera</button>
        </div>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
