<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#edf9ff" />
  <title>Eau de Printemps — 20 Koi Water Ripples</title>
  <style>
    :root {
      --ink: rgba(38, 55, 72, .88);
      --muted: rgba(38, 55, 72, .58);
      --glass: rgba(255,255,255,.36);
      --line: rgba(255,255,255,.62);
      --shadow: 0 28px 100px rgba(108, 166, 196, .34);
      --mx: 50%;
      --my: 50%;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 16% 14%, rgba(203,255,247,.78), transparent 33%),
        radial-gradient(circle at 86% 80%, rgba(255,219,238,.62), transparent 36%),
        linear-gradient(135deg, #fbfeff 0%, #e9f6ff 46%, #fff8fb 100%);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--ink);
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100svh;
      overflow: hidden;
      isolation: isolate;
      border-radius: 0;
      box-shadow: none;
      background: #dff3fb;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: crosshair;
    }

    .layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #waterCanvas {
      z-index: 1;
      background: #e7f7ff;
    }

    #fishCanvas {
      z-index: 2;
      pointer-events: none;
      mix-blend-mode: multiply;
      opacity: .90;
      filter: saturate(1.10) contrast(1.03) brightness(1.02);
    }

    #rippleCanvas {
      z-index: 3;
      mix-blend-mode: screen;
      opacity: .92;
    }

    #causticCanvas {
      z-index: 4;
      mix-blend-mode: screen;
      opacity: .86;
      filter: saturate(1.05) blur(.05px);
    }

    #sparkleCanvas {
      z-index: 5;
      mix-blend-mode: screen;
      opacity: .94;
    }

    .liquid-glow {
      position: absolute;
      inset: -10%;
      z-index: 6;
      pointer-events: none;
      background:
        radial-gradient(circle at var(--mx) var(--my), rgba(255,255,255,.58) 0 1.7%, rgba(183,244,255,.22) 3.8%, transparent 13%),
        radial-gradient(circle at calc(var(--mx) + 8%) calc(var(--my) + 10%), rgba(255,231,244,.18), transparent 20%),
        radial-gradient(circle at 50% 10%, rgba(255,255,255,.20), transparent 26%);
      mix-blend-mode: screen;
      opacity: .78;
      filter: blur(.2px);
    }

    .edge-polish {
      position: absolute;
      inset: 0;
      z-index: 7;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(255,255,255,.34), transparent 16%, transparent 78%, rgba(255,255,255,.25)),
        radial-gradient(ellipse at center, transparent 58%, rgba(166,207,229,.15) 100%);
      mix-blend-mode: overlay;
    }

    .hero {
      position: absolute;
      z-index: 9;
      left: clamp(16px, 4.2vw, 34px);
      top: clamp(16px, 4.2vw, 34px);
      width: min(46vw, 560px);
      pointer-events: none;
      text-shadow: 0 1px 22px rgba(255,255,255,.78);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: rgba(57,83,101,.63);
      font-size: clamp(11px, 1.7vw, 13px);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(46px, 6.2vw, 104px);
      line-height: .92;
      letter-spacing: -.055em;
      font-weight: 780;
      color: rgba(31,52,69,.84);
    }

    .subtitle {
      margin: 12px 0 0;
      color: rgba(45,69,86,.60);
      font-size: clamp(14px, 1.25vw, 18px);
      line-height: 1.55;
      max-width: 32em;
    }

    .panel {
      position: absolute;
      z-index: 10;
      right: clamp(18px, 2.2vw, 36px);
      bottom: max(18px, env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255,255,255,.50), rgba(255,255,255,.20));
      backdrop-filter: blur(22px) saturate(1.38);
      -webkit-backdrop-filter: blur(22px) saturate(1.38);
      box-shadow: 0 14px 40px rgba(79,130,157,.22), inset 0 1px 0 rgba(255,255,255,.50);
    }

    .panel-row,
    .button-row label,
    .hint {
      display: none;
    }

    .button-row {
      display: flex;
      gap: 0;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,.74);
      background: rgba(255,255,255,.42);
      color: rgba(37,57,74,.76);
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-size: 13px;
      font-weight: 780;
      letter-spacing: .02em;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.64), 0 8px 18px rgba(91,143,168,.16);
      transition: transform .18s ease, background .18s ease, opacity .18s ease;
    }

    button:hover { transform: translateY(-1px); background: rgba(255,255,255,.58); }
    button:active { transform: translateY(1px) scale(.99); }

    .loading {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #effbff, #fff8fb);
      color: rgba(43,63,78,.64);
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: opacity .55s ease, visibility .55s ease;
    }

    .loading.hidden {
      opacity: 0;
      visibility: hidden;
    }

    @media (max-width: 540px) {
      .hero { width: 82%; }
      .panel {
      position: absolute;
      z-index: 10;
      right: clamp(18px, 2.2vw, 36px);
      bottom: max(18px, env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255,255,255,.50), rgba(255,255,255,.20));
      backdrop-filter: blur(22px) saturate(1.38);
      -webkit-backdrop-filter: blur(22px) saturate(1.38);
      box-shadow: 0 14px 40px rgba(79,130,157,.22), inset 0 1px 0 rgba(255,255,255,.50);
    }

    .panel-row,
    .button-row label,
    .hint {
      display: none;
    }

    .button-row {
      display: flex;
      gap: 0;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,.74);
      background: rgba(255,255,255,.42);
      color: rgba(37,57,74,.76);
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-size: 13px;
      font-weight: 780;
      letter-spacing: .02em;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.64), 0 8px 18px rgba(91,143,168,.16);
      transition: transform .18s ease, background .18s ease, opacity .18s ease;
    }

    button:hover { transform: translateY(-1px); background: rgba(255,255,255,.58); }
    button:active { transform: translateY(1px) scale(.99); }

    @media (prefers-reduced-motion: reduce) {
      .liquid-glow { opacity: .36; }
    }
  </style>
</head>
<body>
  <main class="app" id="app" aria-label="Interactive pastel flower water ripple experience">
    <canvas class="layer" id="waterCanvas"></canvas>
    <canvas class="layer" id="fishCanvas"></canvas>
    <canvas class="layer" id="rippleCanvas"></canvas>
    <canvas class="layer" id="causticCanvas"></canvas>
    <canvas class="layer" id="sparkleCanvas"></canvas>
    <div class="liquid-glow" aria-hidden="true"></div>
    <div class="edge-polish" aria-hidden="true"></div>

    <header class="hero">
      <p class="eyebrow">ふれてみて · touch the water</p>
      <h1>Eau de Printemps</h1>
      <p class="subtitle">A full-screen pastel water surface with glossy ripples, translucent flowers, 20 top-view colorful koi, natural fish-like swimming, soft caustic light, shimmer particles, and gentle ambient music.</p>
    </header>

    <section class="panel" aria-label="Snapshot control">
      <div class="button-row">
        <button type="button" id="cameraBtn" title="Save current water scene">snapshot</button>
      </div>
    </section>

    <div class="loading" id="loading">loading water</div>
  </main>

      const app = document.getElementById('app');
      const waterCanvas = document.getElementById('waterCanvas');
      const fishCanvas = document.getElementById('fishCanvas');
      const rippleCanvas = document.getElementById('rippleCanvas');
      const causticCanvas = document.getElementById('causticCanvas');
      const sparkleCanvas = document.getElementById('sparkleCanvas');
      const loading = document.getElementById('loading');
      const cameraBtn = document.getElementById('cameraBtn');

      const wctx = waterCanvas.getContext('2d', { alpha: false });
      const fctx = fishCanvas.getContext('2d');
      const rctx = rippleCanvas.getContext('2d');
      const cctx = causticCanvas.getContext('2d');
      const sctx = sparkleCanvas.getContext('2d');

      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
      const lerp = (a, b, t) => a + (b - a) * t;
      const rand = (min, max) => min + Math.random() * (max - min);
      const TAU = Math.PI * 2;
      const isTouchDevice = matchMedia('(pointer: coarse)').matches;
      const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

      const settings = {
        distortion: 0.78,
        ripple: 0.80,
        light: 0.76,
        sparkle: 0.68,
        quality: 0.82
      };

      const audio = {
        ctx: null,
        master: null,
        shimmerGain: null,
        started: false,
        enabled: true
      };

      function makeImpulse(ctx, seconds = 3.8, decay = 4.2) {
        const length = Math.floor(ctx.sampleRate * seconds);
        const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
        for (let channel = 0; channel < 2; channel++) {
          const data = impulse.getChannelData(channel);
          for (let i = 0; i < length; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
          }
        }
        return impulse;
      }

      function makeNoiseBuffer(ctx, seconds = 2) {
        const length = Math.floor(ctx.sampleRate * seconds);
        const buffer = ctx.createBuffer(1, length, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        let last = 0;
        for (let i = 0; i < length; i++) {
          last = last * .985 + (Math.random() * 2 - 1) * .015;
          data[i] = last;
        }
        return buffer;
      }

      function startAmbientMusic() {
        if (audio.started || !audio.enabled) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;

        const ctx = new AudioContext();
        audio.ctx = ctx;

        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, ctx.currentTime);
        master.gain.exponentialRampToValueAtTime(0.20, ctx.currentTime + 2.6);
        master.connect(ctx.destination);
        audio.master = master;

        const reverb = ctx.createConvolver();
        reverb.buffer = makeImpulse(ctx, 4.6, 4.6);
        const reverbGain = ctx.createGain();
        reverbGain.gain.value = .32;
        reverb.connect(reverbGain).connect(master);

        const padBus = ctx.createGain();
        padBus.gain.value = .16;
        padBus.connect(reverb);
        padBus.connect(master);

        const notes = [293.66, 369.99, 440.00, 554.37, 659.25];
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const filter = ctx.createBiquadFilter();
          const lfo = ctx.createOscillator();
          const lfoGain = ctx.createGain();

          osc.type = i % 2 ? 'sine' : 'triangle';
          osc.frequency.value = freq * (i === 4 ? .5 : 1);
          osc.detune.value = rand(-6, 6);

          filter.type = 'lowpass';
          filter.frequency.value = 760 + i * 120;
          filter.Q.value = .55;

          gain.gain.value = 0.012 + i * .003;
          lfo.type = 'sine';
          lfo.frequency.value = .025 + i * .011;
          lfoGain.gain.value = .006;
          lfo.connect(lfoGain).connect(gain.gain);

          osc.connect(filter).connect(gain).connect(padBus);
          osc.start(ctx.currentTime + i * .08);
          lfo.start(ctx.currentTime + i * .08);
        });

        const water = ctx.createBufferSource();
        water.buffer = makeNoiseBuffer(ctx, 3.2);
        water.loop = true;

        const waterFilter = ctx.createBiquadFilter();
        waterFilter.type = 'bandpass';
        waterFilter.frequency.value = 1150;
        waterFilter.Q.value = .45;

        const waterGain = ctx.createGain();
        waterGain.gain.value = .030;
        water.connect(waterFilter).connect(waterGain).connect(master);
        water.start();

        const shimmer = ctx.createBufferSource();
        shimmer.buffer = makeNoiseBuffer(ctx, 1.35);
        shimmer.loop = true;

        const shimmerFilter = ctx.createBiquadFilter();
        shimmerFilter.type = 'highpass';
        shimmerFilter.frequency.value = 2800;
        shimmerFilter.Q.value = .7;

        const shimmerGain = ctx.createGain();
        shimmerGain.gain.value = .010;
        shimmer.connect(shimmerFilter).connect(shimmerGain).connect(reverb);
        shimmer.start();
        audio.shimmerGain = shimmerGain;

        audio.started = true;
      }

      function updateAmbientMusic() {
        if (!audio.started || !audio.ctx || !audio.master) return;
        const t = audio.ctx.currentTime;
        const pointerLift = clamp(state.pointer.energy / 2.4, 0, 1);
        audio.master.gain.setTargetAtTime(0.18 + pointerLift * .055, t, .55);
        if (audio.shimmerGain) audio.shimmerGain.gain.setTargetAtTime(.010 + pointerLift * .026, t, .26);
      }


      const state = {
        w: 1,
        h: 1,
        dpr: 1,
        time: 0,
        fit: { scale: 1, dx: 0, dy: 0, dw: 1, dh: 1 },
        imageReady: false,
        pointer: {
          x: 0,
          y: 0,
          px: 0,
          py: 0,
          vx: 0,
          vy: 0,
          speed: 0,
          energy: 0,
          active: false,
          hasMoved: false,
          lastMove: 0,
          lastRipple: 0,
          lastParticle: 0
        },
        ripples: [],
        particles: [],
        fishes: [],
        caustics: []
      };

      const image = new Image();
      image.decoding = 'async';
      image.onload = () => {
        state.imageReady = true;
        resize();
        seedKoi();
        seedOpeningMotion();
        loading.classList.add('hidden');
        requestAnimationFrame(frame);
      };
      image.src = IMAGE_SRC;

      function resizeCanvas(canvas, ctx) {
        canvas.width = Math.floor(state.w * state.dpr);
        canvas.height = Math.floor(state.h * state.dpr);
        canvas.style.width = state.w + 'px';
        canvas.style.height = state.h + 'px';
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      }

      function resize() {
        const rect = app.getBoundingClientRect();
        state.w = Math.max(1, rect.width);
        state.h = Math.max(1, rect.height);
        const dprLimit = isTouchDevice ? 1.55 : 2;
        state.dpr = Math.min(window.devicePixelRatio || 1, dprLimit);

        resizeCanvas(waterCanvas, wctx);
        resizeCanvas(fishCanvas, fctx);
        resizeCanvas(rippleCanvas, rctx);
        resizeCanvas(causticCanvas, cctx);
        resizeCanvas(sparkleCanvas, sctx);

        if (state.imageReady) updateImageFit();
        buildCaustics();
        clampKoiToStage();

        if (!state.pointer.hasMoved) {
          state.pointer.x = state.w * .5;
          state.pointer.y = state.h * .5;
          state.pointer.px = state.pointer.x;
          state.pointer.py = state.pointer.y;
        }
      }

      function updateImageFit() {
        const scale = Math.max(state.w / image.naturalWidth, state.h / image.naturalHeight);
        const dw = image.naturalWidth * scale;
        const dh = image.naturalHeight * scale;
        state.fit = {
          scale,
          dw,
          dh,
          dx: (state.w - dw) * .5,
          dy: (state.h - dh) * .5
        };
      }

      window.addEventListener('resize', resize, { passive: true });
      window.addEventListener('orientationchange', () => setTimeout(resize, 160), { passive: true });

      function pointerFromEvent(event) {
        const rect = app.getBoundingClientRect();
        return {
          x: clamp(event.clientX - rect.left, 0, state.w),
          y: clamp(event.clientY - rect.top, 0, state.h)
        };
      }

      function updatePointer(event, pressed = false) {
        const now = performance.now();
        const p = pointerFromEvent(event);
        const pointer = state.pointer;
        const dt = clamp((now - (pointer.lastMove || now)) / 1000, 0.008, 0.08);

        const dx = p.x - pointer.x;
        const dy = p.y - pointer.y;
        const instantVx = dx / dt;
        const instantVy = dy / dt;
        const instantSpeed = Math.hypot(instantVx, instantVy);

        pointer.vx = lerp(pointer.vx, instantVx, .28);
        pointer.vy = lerp(pointer.vy, instantVy, .28);
        pointer.speed = lerp(pointer.speed, instantSpeed, .25);
        pointer.px = pointer.x;
        pointer.py = pointer.y;
        pointer.x = p.x;
        pointer.y = p.y;
        pointer.lastMove = now;
        pointer.hasMoved = true;
        pointer.energy = clamp(pointer.energy + pointer.speed / 1750 + (pressed ? .45 : 0), 0, 2.4);

        app.style.setProperty('--mx', (p.x / state.w * 100).toFixed(2) + '%');
        app.style.setProperty('--my', (p.y / state.h * 100).toFixed(2) + '%');

        const distance = Math.hypot(dx, dy);
        if (!reduceMotion && distance > 4) {
          const velocityStrength = clamp(pointer.speed / 900, .12, 1.8);
          if (now - pointer.lastRipple > lerp(92, 24, clamp(velocityStrength / 1.8, 0, 1))) {
            addRipple(p.x, p.y, .32 + velocityStrength * .42, 'trail');
            pointer.lastRipple = now;
          }
          if (now - pointer.lastParticle > lerp(95, 22, clamp(velocityStrength / 1.8, 0, 1))) {
            spawnSparkles(p.x, p.y, Math.ceil(velocityStrength * 2.2 * settings.sparkle), velocityStrength);
            pointer.lastParticle = now;
          }
        }
      }

      app.addEventListener('pointermove', (event) => updatePointer(event, false), { passive: true });
      app.addEventListener('pointerdown', (event) => {
        startAmbientMusic();
        state.pointer.active = true;
        app.setPointerCapture?.(event.pointerId);
        updatePointer(event, true);
        const p = pointerFromEvent(event);
        addRipple(p.x, p.y, 1.85, 'splash');
        spawnSparkles(p.x, p.y, Math.round(20 * settings.sparkle + 8), 1.8);
      });
      app.addEventListener('pointerup', () => { state.pointer.active = false; }, { passive: true });
      app.addEventListener('pointercancel', () => { state.pointer.active = false; }, { passive: true });
      app.addEventListener('pointerleave', () => { state.pointer.active = false; }, { passive: true });

      function addRipple(x, y, strength = 1, kind = 'trail') {
        if (settings.ripple <= .01 && settings.distortion <= .01) return;
        const speed = kind === 'splash' ? rand(210, 280) : rand(145, 220);
        const life = kind === 'splash' ? rand(1.65, 2.30) : rand(1.05, 1.70);
        const amp = (kind === 'splash' ? rand(13, 23) : rand(6, 13)) * strength;
        state.ripples.push({
          x,
          y,
          birth: performance.now(),
          seed: Math.random() * 999,
          strength,
          kind,
          radius: kind === 'splash' ? rand(5, 11) : rand(2, 6),
          speed,
          amp,
          maxRadius: Math.hypot(state.w, state.h) * (kind === 'splash' ? .44 : .26),
          damping: kind === 'splash' ? rand(1.28, 1.72) : rand(1.65, 2.35),
          life
        });
        if (state.ripples.length > 34) state.ripples.splice(0, state.ripples.length - 34);
      }

      function displacementAt(x, y, now) {
        let ox = 0;
        let oy = 0;
        let intensity = 0;
        const pointer = state.pointer;
        const pointerAge = (now - pointer.lastMove) / 1000;
        const pointerEnergy = pointer.energy * Math.exp(-pointerAge * 2.1) * settings.distortion;

        if (pointerEnergy > .006) {
          const dx = x - pointer.x;
          const dy = y - pointer.y;
          const dist = Math.hypot(dx, dy) + .001;
          const ux = dx / dist;
          const uy = dy / dist;
          const lensRadius = lerp(58, 124, clamp(pointer.speed / 1600, 0, 1));
          const g = Math.exp(-(dist * dist) / (2 * lensRadius * lensRadius));
          const liquidWobble = Math.sin(dist * .105 - now * .006) * 2.0;

          ox += pointer.vx * .010 * g * pointerEnergy;
          oy += pointer.vy * .010 * g * pointerEnergy;
          ox += ux * (8.5 + liquidWobble) * g * pointerEnergy;
          oy += uy * (8.5 + liquidWobble) * g * pointerEnergy;
          intensity += g * pointerEnergy;
        }

        for (const r of state.ripples) {
          const age = (now - r.birth) / 1000;
          if (age < 0 || age > r.life) continue;

          const dx = x - r.x;
          const dy = y - r.y;
          const dist = Math.hypot(dx, dy) + .001;
          const ux = dx / dist;
          const uy = dy / dist;
          const angle = Math.atan2(dy, dx);
          const radius = r.radius + r.speed * age;
          if (radius > r.maxRadius) continue;

          const sigma = r.kind === 'splash' ? 13 : 9;
          const delta = dist - radius;
          const envelope = Math.exp(-(delta * delta) / (2 * sigma * sigma));
          const tailEnvelope = Math.exp(-Math.max(0, dist - radius) * .006);
          const decay = Math.exp(-r.damping * age) * (1 - age / r.life);
          const organic = 1 + .16 * Math.sin(angle * 5.0 + r.seed + age * 2.2) + .08 * Math.sin(angle * 9.0 - age * 3.4 + r.seed * .37);
          const wave = Math.sin(delta * .235 - age * 8.4 + r.seed * .015) * envelope * tailEnvelope * decay * r.amp * settings.ripple * settings.distortion * organic;

          ox += ux * wave;
          oy += uy * wave;
          intensity += Math.abs(wave) * .045;
        }

        return { x: ox, y: oy, intensity };
      }

      function drawWater(now) {
        if (!state.imageReady) return;
        const { w, h, fit } = state;

        wctx.save();
        wctx.globalCompositeOperation = 'source-over';
        wctx.clearRect(0, 0, w, h);
        wctx.imageSmoothingEnabled = true;
        wctx.imageSmoothingQuality = 'high';
        wctx.filter = 'saturate(1.055) contrast(1.035) brightness(1.015)';
        wctx.drawImage(image, fit.dx, fit.dy, fit.dw, fit.dh);

        const baseCell = isTouchDevice ? 34 : 27;
        const qualityBoost = lerp(1.48, .78, settings.quality);
        const cell = Math.max(14, baseCell * qualityBoost);
        const pad = cell * .35;
        const sourcePad = 1.35;
        const maxShift = isTouchDevice ? 28 : 36;

        wctx.globalAlpha = .88;
        wctx.filter = 'saturate(1.075) contrast(1.045) brightness(1.02)';

        for (let y = -pad; y < h + pad; y += cell) {
          for (let x = -pad; x < w + pad; x += cell) {
            const cx = x + cell * .5;
            const cy = y + cell * .5;
            const d = displacementAt(cx, cy, now);
            const mag = Math.hypot(d.x, d.y);
            if (mag < .22) continue;

            const shiftX = clamp(d.x, -maxShift, maxShift);
            const shiftY = clamp(d.y, -maxShift, maxShift);
            const dw = cell + sourcePad * 2;
            const dh = cell + sourcePad * 2;
            let sx = (x - sourcePad - fit.dx) / fit.scale;
            let sy = (y - sourcePad - fit.dy) / fit.scale;
            let sw = dw / fit.scale;
            let sh = dh / fit.scale;

            if (sx < 0) { sw += sx; sx = 0; }
            if (sy < 0) { sh += sy; sy = 0; }
            if (sx + sw > image.naturalWidth) sw = image.naturalWidth - sx;
            if (sy + sh > image.naturalHeight) sh = image.naturalHeight - sy;
            if (sw <= 0 || sh <= 0) continue;

            const localAlpha = clamp(.34 + d.intensity * .55, .30, .94);
            wctx.globalAlpha = localAlpha;
            wctx.drawImage(
              image,
              sx,
              sy,
              sw,
              sh,
              x - sourcePad + shiftX,
              y - sourcePad + shiftY,
              sw * fit.scale,
              sh * fit.scale
            );
          }
        }

        wctx.globalAlpha = 1;
        wctx.filter = 'none';
        wctx.restore();
      }

      function makePatch(x, y, rx, ry, color, alpha = .88, rot = 0) {
        return { x, y, rx, ry, color, alpha, rot, wob: rand(.65, 1.45) };
      }

      function patchesFor(profile) {
        const c = profile.colors;
        switch (profile.pattern) {
          case 'kohaku':
            return [makePatch(-.25, -.08, .15, .32, c[0]), makePatch(.00, .12, .18, .28, c[0], .86, .22), makePatch(.27, -.03, .13, .22, c[0], .82, -.16)];
          case 'showa':
            return [makePatch(-.25,.08,.22,.35,c[1],.85,.1), makePatch(-.05,-.16,.16,.28,c[0],.88,-.25), makePatch(.12,.13,.16,.27,c[1],.82,.18), makePatch(.29,-.02,.16,.24,c[0],.9,0)];
          case 'sanke':
            return [makePatch(-.30,-.04,.14,.28,c[0]), makePatch(-.02,.12,.18,.26,c[0],.88), makePatch(.21,-.08,.15,.22,c[0]), makePatch(.03,-.22,.08,.13,c[1],.72), makePatch(.31,.16,.07,.12,c[1],.70)];
          case 'shiro':
            return [makePatch(-.28,-.09,.18,.33,c[0],.88), makePatch(.02,.14,.18,.29,c[0],.84), makePatch(.24,-.12,.14,.23,c[0],.80)];
          case 'asagi':
            return [makePatch(.28,.00,.10,.20,c[1],.80), makePatch(.15,.22,.08,.16,c[1],.58), makePatch(.16,-.22,.08,.16,c[1],.58)];
          case 'ogon':

          case 'goshiki':
            return [makePatch(-.20,.02,.17,.32,c[0],.86), makePatch(.05,-.10,.16,.25,c[0],.86), makePatch(.27,.05,.11,.19,c[0],.82), makePatch(-.36,.12,.09,.16,c[1],.38)];
          case 'tanchoShowa':
            return [makePatch(-.22,.09,.17,.28,c[1],.82), makePatch(.04,-.13,.14,.24,c[1],.76), makePatch(.33,.00,.12,.18,c[0],.94)];
          case 'ochiba':
            return [makePatch(-.27,.05,.16,.30,c[0],.70), makePatch(-.03,-.10,.14,.24,c[1],.60), makePatch(.22,.12,.12,.19,c[2],.68)];
          case 'shusui':
            return [makePatch(.28,.00,.10,.18,c[1],.82), makePatch(-.18,.20,.10,.20,c[1],.60), makePatch(-.18,-.20,.10,.20,c[1],.60)];
          case 'kujaku':
            return [makePatch(-.20,.04,.17,.30,c[2],.78), makePatch(.07,-.08,.14,.23,c[0],.78), makePatch(.25,.09,.11,.18,c[0],.72)];
          case 'goromo':
            return [makePatch(-.28,.08,.17,.32,c[0],.82), makePatch(-.02,-.09,.16,.26,c[1],.78), makePatch(.24,.08,.12,.20,c[0],.72)];
          case 'hiUtsuri':
            return [makePatch(-.27,.06,.20,.34,c[0],.88), makePatch(.00,-.12,.17,.28,c[1],.86), makePatch(.25,.09,.14,.24,c[0],.80)];
          case 'kiUtsuri':
            return [makePatch(-.25,-.05,.21,.34,c[0],.88), makePatch(.04,.13,.18,.28,c[1],.86), makePatch(.27,-.07,.14,.23,c[0],.80)];
          case 'chagoi':
            return [];
          case 'beniKumonryu':
            return [makePatch(-.30,.03,.18,.30,c[0],.86), makePatch(-.06,-.12,.16,.24,c[1],.80), makePatch(.20,.10,.15,.22,c[0],.82), makePatch(.32,-.02,.11,.17,c[1],.78)];
          case 'tancho':
            return [makePatch(.34,.00,.12,.20,c[0],.94)];
          case 'kinShowa':
            return [makePatch(-.26,.04,.18,.32,c[0],.86), makePatch(-.02,-.12,.15,.25,c[1],.70), makePatch(.24,.06,.13,.22,c[0],.82), makePatch(.32,-.04,.09,.14,c[1],.65)];
          case 'ginMatsuba':
            return [];
          case 'kumonryu':
            return [makePatch(-.30,-.02,.18,.32,c[0],.84), makePatch(.02,.14,.18,.28,c[0],.80), makePatch(.26,-.08,.14,.22,c[0],.76)];
          default:
            return [makePatch(rand(-.26,.25), rand(-.16,.16), rand(.10,.18), rand(.18,.32), c[0])];

      function seedKoi() {
        if (state.fishes.length) return;
        const minSide = Math.min(state.w, state.h);
        const cols = 5;
        const rows = 4;
        for (let i = 0; i < 20; i++) {
          const profile = koiProfiles[i % koiProfiles.length];
          const cellX = (i % cols + .5) / cols;
          const cellY = (Math.floor(i / cols) + .5) / rows;
          const size = rand(minSide * .0115, minSide * .0195) * profile.scale;
          const angle = rand(0, TAU);
          state.fishes.push({
            x: clamp(state.w * (cellX + rand(-.065, .065)), 44, state.w - 44),
            y: clamp(state.h * (cellY + rand(-.085, .085)), 44, state.h - 44),
            vx: Math.cos(angle) * rand(10, 22),
            vy: Math.sin(angle) * rand(10, 22),
            angle,
            targetAngle: angle + rand(-.8, .8),
            speed: rand(13, 30),
            targetSpeed: rand(13, 30),
            size,
            profile,
            patches: patchesFor(profile),
            phase: rand(0, TAU),
            turnTimer: rand(.6, 3.0),
            dartTimer: rand(3.0, 8.0),
            depth: rand(.60, .88),
            rippleTimer: rand(.3, 2.2),
            bubbleTimer: rand(2.2, 6.4),
            sway: rand(.85, 1.42),
            bodyCurve: 0,
            tailPower: rand(.82, 1.35),
            glide: rand(.85, 1.15),
            layerDrift: rand(-.16, .16)
          });
        }
      }

      function clampKoiToStage() {
        if (!state.fishes.length) return;
        for (const fish of state.fishes) {
          fish.x = clamp(fish.x, 34, Math.max(35, state.w - 34));
          fish.y = clamp(fish.y, 34, Math.max(35, state.h - 34));
        }
      }

      function angleLerp(a, b, t) {
        let diff = ((b - a + Math.PI) % TAU) - Math.PI;
        if (diff < -Math.PI) diff += TAU;
        return a + diff * t;
      }

      function steerToAngle(fish, desired, amount) {
        fish.targetAngle = angleLerp(fish.targetAngle, desired, amount);
      }

      function updateKoi(dt, now) {
        if (!state.fishes.length) return;
        const p = state.pointer;
        const margin = Math.min(state.w, state.h) * .105;
        const pointerAge = (now - p.lastMove) / 1000;

        for (let i = 0; i < state.fishes.length; i++) {
          const fish = state.fishes[i];
          fish.turnTimer -= dt;
          fish.dartTimer -= dt;
          fish.rippleTimer -= dt;
          fish.bubbleTimer -= dt;

          const swimRate = 3.2 + fish.speed * .10;
          fish.phase += dt * swimRate * fish.sway;

          if (fish.turnTimer <= 0) {
            fish.targetAngle += rand(-.86, .86) + Math.sin(now * .00018 + i) * .20;
            fish.targetSpeed = rand(10, 32) * fish.glide;
            fish.turnTimer = rand(1.1, 4.4);
          }

          if (fish.dartTimer <= 0) {
            fish.targetSpeed += rand(8, 18);
            fish.targetAngle += rand(-.34, .34);
            fish.dartTimer = rand(4.5, 10.0);
          }

          // Soft boundary steering: fish turns like a real fish instead of bouncing.
          if (fish.x < margin) steerToAngle(fish, 0, .065);
          if (fish.x > state.w - margin) steerToAngle(fish, Math.PI, .065);
          if (fish.y < margin) steerToAngle(fish, Math.PI / 2, .065);
          if (fish.y > state.h - margin) steerToAngle(fish, -Math.PI / 2, .065);

          // Gentle separation so 20 fish do not stack too much.
          let sepX = 0, sepY = 0;
          for (let j = 0; j < state.fishes.length; j++) {
            if (i === j) continue;
            const other = state.fishes[j];
            const dx = fish.x - other.x;
            const dy = fish.y - other.y;
            const d2 = dx * dx + dy * dy;
            if (d2 > 1 && d2 < 95 * 95) {
              const d = Math.sqrt(d2);
              const f = (1 - d / 95) * .45;
              sepX += dx / d * f;
              sepY += dy / d * f;
            }
          }
          if (Math.abs(sepX) + Math.abs(sepY) > .001) {
            steerToAngle(fish, Math.atan2(sepY, sepX), .020);
          }

          // Cursor/touch interaction: fish politely swim away and make water trails.
          if (p.hasMoved && pointerAge < 2.2) {
            const dx = fish.x - p.x;
            const dy = fish.y - p.y;
            const dist = Math.hypot(dx, dy);
            const avoidRadius = 170 + fish.size * 2.5;
            if (dist < avoidRadius) {
              const avoid = Math.atan2(dy, dx);
              const force = (1 - dist / avoidRadius) * clamp(p.energy, .25, 1.8);
              steerToAngle(fish, avoid + Math.sin(fish.phase) * .18, .045 + force * .095);
              fish.targetSpeed = Math.max(fish.targetSpeed, 20 + force * 22);
              if (Math.random() < .018 * force) addRipple(fish.x, fish.y, .16 + force * .10, 'trail');
            }
          }

          const prevAngle = fish.angle;
          fish.angle = angleLerp(fish.angle, fish.targetAngle, .020 + dt * 1.15);
          fish.speed = lerp(fish.speed, clamp(fish.targetSpeed, 7, 48), .016 + dt * .82);
          fish.targetSpeed = lerp(fish.targetSpeed, 18, dt * .05);

          const turnAmount = ((fish.angle - prevAngle + Math.PI) % TAU) - Math.PI;
          fish.bodyCurve = lerp(fish.bodyCurve, clamp(turnAmount * 9, -.46, .46), .08);

          const tailKick = Math.sin(fish.phase) * fish.size * .34 * fish.tailPower;
          const side = fish.angle + Math.PI / 2;
          const glidePulse = 1 + Math.sin(fish.phase * .5) * .035;
          fish.x += Math.cos(fish.angle) * fish.speed * dt * glidePulse + Math.cos(side) * tailKick * dt;
          fish.y += Math.sin(fish.angle) * fish.speed * dt * glidePulse + Math.sin(side) * tailKick * dt;

          if (fish.x < -80) fish.x = state.w + 60;
          if (fish.x > state.w + 80) fish.x = -60;
          if (fish.y < -80) fish.y = state.h + 60;
          if (fish.y > state.h + 80) fish.y = -60;

          if (!reduceMotion && fish.rippleTimer <= 0) {
            const tx = fish.x - Math.cos(fish.angle) * fish.size * 2.1;
            const ty = fish.y - Math.sin(fish.angle) * fish.size * 2.1;
            addRipple(tx, ty, rand(.075, .16) + fish.speed * .002, 'trail');
            fish.rippleTimer = rand(1.35, 3.6);
          }

          if (!reduceMotion && fish.bubbleTimer <= 0 && Math.random() < .85) {
            makeSparkle(fish.x + rand(-fish.size, fish.size), fish.y + rand(-fish.size, fish.size));
            fish.bubbleTimer = rand(2.5, 7.0);
          }
        }
      }

      function koiBodyPath(ctx, len, wid, curve) {
        const noseX = len * .49;
        const tailX = -len * .49;
        const c = curve * wid * .46;
        ctx.beginPath();
        ctx.moveTo(noseX, 0);
        ctx.bezierCurveTo(len * .38, -wid * .56, -len * .14, -wid * .58 + c, tailX, -wid * .18 + c);
        ctx.quadraticCurveTo(tailX - len * .035, c, tailX, wid * .18 + c);
        ctx.bezierCurveTo(-len * .14, wid * .58 + c, len * .38, wid * .56, noseX, 0);
        ctx.closePath();
      }

      function drawScaleNet(ctx, len, wid, fish, color = 'rgba(41,72,91,.20)') {
        ctx.save();
        koiBodyPath(ctx, len, wid, fish.bodyCurve);
        ctx.clip();
        ctx.strokeStyle = color;
        ctx.lineWidth = Math.max(.45, fish.size * .018);
        for (let x = -len * .38; x < len * .32; x += fish.size * .34) {
          ctx.beginPath();
          ctx.moveTo(x, -wid * .44);
          ctx.quadraticCurveTo(x + fish.size * .20, 0, x, wid * .44);
          ctx.stroke();
        }
        for (let y = -wid * .32; y <= wid * .32; y += fish.size * .22) {
          ctx.beginPath();
          ctx.moveTo(-len * .40, y);
          ctx.quadraticCurveTo(-len * .02, y + Math.sin(fish.phase + y) * .7, len * .36, y * .68);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawPatches(ctx, fish, len, wid) {
        const patches = fish.patches || [];
        if (!patches.length) return;
        ctx.save();
        koiBodyPath(ctx, len, wid, fish.bodyCurve);
        ctx.clip();
        for (const spot of patches) {
          const localWave = Math.sin(fish.phase + spot.x * 5.2) * fish.size * .035 * spot.wob;
          ctx.save();
          ctx.translate(spot.x * len, spot.y * wid + localWave);
          ctx.rotate(spot.rot + Math.sin(fish.phase * .7 + spot.x) * .08);
          ctx.globalAlpha = fish.depth * spot.alpha;
          const g = ctx.createRadialGradient(-spot.rx * len * .20, -spot.ry * wid * .20, 0, 0, 0, spot.rx * len * .90);
          g.addColorStop(0, spot.color);
          g.addColorStop(.72, spot.color);
          g.addColorStop(1, 'rgba(255,255,255,.02)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.ellipse(0, 0, spot.rx * len, spot.ry * wid, 0, 0, TAU);
          ctx.fill();
          ctx.restore();
        }
        ctx.restore();
      }

      function drawSpecialPattern(ctx, fish, len, wid) {
        const pattern = fish.profile.pattern;
        if (pattern === 'asagi' || pattern === 'shusui' || pattern === 'kujaku' || pattern === 'ginMatsuba') {
          drawScaleNet(ctx, len, wid, fish, pattern === 'ginMatsuba' ? 'rgba(35,55,79,.28)' : 'rgba(35,75,92,.24)');
          ctx.save();
          koiBodyPath(ctx, len, wid, fish.bodyCurve);
          ctx.clip();
          ctx.strokeStyle = pattern === 'asagi' ? 'rgba(240,86,64,.45)' : 'rgba(255,255,255,.28)';
          ctx.lineWidth = Math.max(.8, fish.size * .07);
          ctx.beginPath();
          ctx.moveTo(-len * .42, 0);
          ctx.quadraticCurveTo(-len * .05, Math.sin(fish.phase) * fish.size * .02, len * .38, 0);
          ctx.stroke();
          ctx.restore();
        }
        if (pattern === 'chagoi' || pattern === 'ogon') {
          drawScaleNet(ctx, len, wid, fish, pattern === 'chagoi' ? 'rgba(96,54,23,.15)' : 'rgba(170,114,10,.11)');
        }
      }

      function drawKoiBody(ctx, fish, now) {
        const s = fish.size;
        const len = s * 3.45;
        const wid = s * 1.08;
        const profile = fish.profile;
        const tailWag = Math.sin(fish.phase) * .58 * fish.tailPower + fish.bodyCurve * .45;
        const finFlap = Math.sin(fish.phase + .8) * .22;

        ctx.save();
        ctx.translate(fish.x, fish.y);
        ctx.rotate(fish.angle + Math.sin(fish.phase * .42) * .018 + fish.bodyCurve * .05);
        ctx.globalAlpha = fish.depth;

        // Soft underwater shadow and wake.
        const shadowGrad = ctx.createRadialGradient(-s * .30, s * .22, 0, -s * .30, s * .22, len * .70);
        shadowGrad.addColorStop(0, 'rgba(67,106,128,.16)');
        shadowGrad.addColorStop(.68, 'rgba(67,106,128,.052)');
        shadowGrad.addColorStop(1, 'rgba(67,106,128,0)');
        ctx.fillStyle = shadowGrad;
        ctx.beginPath();
        ctx.ellipse(-s * .15, s * .18, len * .56, wid * .92, fish.bodyCurve * .12, 0, TAU);
        ctx.fill();

        // Forked tail with visible swim wag.
        ctx.save();
        ctx.translate(-len * .51, fish.bodyCurve * wid * .34);
        ctx.rotate(tailWag);
        ctx.globalAlpha = fish.depth * .70;
        ctx.fillStyle = profile.fins;
        ctx.strokeStyle = 'rgba(255,255,255,.28)';
        ctx.lineWidth = Math.max(.45, s * .025);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-s * .78, -s * .58, -s * 1.18, -s * .26);
        ctx.quadraticCurveTo(-s * .74, -s * .03, 0, 0);
        ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-s * .78, s * .58, -s * 1.18, s * .26);
        ctx.quadraticCurveTo(-s * .74, s * .03, 0, 0);
        ctx.fill(); ctx.stroke();
        ctx.restore();

        // Pectoral fins that flap as the fish swims.
        ctx.save();
        ctx.globalAlpha = fish.depth * .50;
        ctx.fillStyle = profile.fins;
        ctx.translate(-s * .08, 0);
        ctx.beginPath();
        ctx.ellipse(-s * .10, -wid * .57, s * .64, s * .22, -.55 - finFlap, 0, TAU);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(-s * .10, wid * .57, s * .64, s * .22, .55 + finFlap, 0, TAU);
        ctx.fill();
        ctx.restore();

        // Body fill.
        const bodyGrad = ctx.createLinearGradient(-len * .48, -wid * .48, len * .50, wid * .45);
        bodyGrad.addColorStop(0, profile.base);
        bodyGrad.addColorStop(.35, 'rgba(255,255,255,.94)');
        bodyGrad.addColorStop(.62, profile.base);
        bodyGrad.addColorStop(1, 'rgba(255,255,255,.88)');
        ctx.fillStyle = bodyGrad;
        ctx.strokeStyle = 'rgba(255,255,255,.50)';
        ctx.lineWidth = Math.max(.5, s * .04);
        koiBodyPath(ctx, len, wid, fish.bodyCurve);
        ctx.fill();
        ctx.stroke();

        drawSpecialPattern(ctx, fish, len, wid);
        drawPatches(ctx, fish, len, wid);

        // Subtle head shine.
        const headGlow = ctx.createRadialGradient(len * .32, -wid * .13, 0, len * .32, -wid * .13, len * .34);
        headGlow.addColorStop(0, 'rgba(255,255,255,.30)');
        headGlow.addColorStop(.72, 'rgba(255,255,255,.06)');
        headGlow.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = headGlow;
        koiBodyPath(ctx, len, wid, fish.bodyCurve);
        ctx.fill();

        // Eyes.
        ctx.save();
        ctx.globalAlpha = fish.depth * .72;
        ctx.fillStyle = 'rgba(31,39,49,.62)';
        ctx.beginPath();
        ctx.arc(len * .34, -wid * .20, Math.max(.9, s * .055), 0, TAU);
        ctx.arc(len * .34, wid * .20, Math.max(.9, s * .055), 0, TAU);
        ctx.fill();
        ctx.restore();

        // Gloss line following the fish body.
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = fish.depth * .46;
        ctx.strokeStyle = 'rgba(255,255,255,.42)';
        ctx.lineWidth = Math.max(.7, s * .055);
        ctx.beginPath();
        ctx.moveTo(-len * .30, -wid * .17 + fish.bodyCurve * wid * .18);
        ctx.quadraticCurveTo(-len * .02, -wid * .25, len * .32, -wid * .08);
        ctx.stroke();
        ctx.restore();

        ctx.restore();
      }

      function drawKoi(now) {
        fctx.clearRect(0, 0, state.w, state.h);
        if (!state.fishes.length) return;
        fctx.save();
        fctx.imageSmoothingEnabled = true;
        fctx.imageSmoothingQuality = 'high';
        fctx.globalCompositeOperation = 'source-over';
        fctx.filter = 'saturate(1.05) contrast(1.02) brightness(1.015)';

        const sorted = [...state.fishes].sort((a, b) => a.depth - b.depth);
        for (const fish of sorted) drawKoiBody(fctx, fish, now);

        // Water gloss above the fish so they feel submerged, not pasted on top.
        fctx.filter = 'none';
        fctx.globalCompositeOperation = 'screen';
        for (const fish of sorted) {
          const flash = .055 + .035 * Math.sin(now * .002 + fish.phase);
          const g = fctx.createRadialGradient(fish.x, fish.y, 0, fish.x, fish.y, fish.size * 3.4);
          g.addColorStop(0, `rgba(255,255,255,${flash})`);
          g.addColorStop(.62, 'rgba(185,244,255,.028)');
          g.addColorStop(1, 'rgba(255,255,255,0)');
          fctx.fillStyle = g;
          fctx.beginPath();
          fctx.arc(fish.x, fish.y, fish.size * 3.4, 0, TAU);
          fctx.fill();
        }
        fctx.restore();
      }

      function drawOrganicRing(ctx, x, y, radius, alpha, seed, now, width) {
        const points = radius < 70 ? 72 : 110;
        ctx.beginPath();
        for (let i = 0; i <= points; i++) {
          const a = i / points * TAU;
          const wobble =
            Math.sin(a * 3.2 + seed + now * .0017) * 1.8 +
            Math.sin(a * 7.3 - seed * .3 + now * .0023) * 1.1 +
            Math.sin(a * 13.0 + now * .0011) * .45;
          const rr = radius + wobble;
          const px = x + Math.cos(a) * rr;
          const py = y + Math.sin(a) * rr;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.lineWidth = width;
        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.stroke();
      }

      function drawRipples(now) {
        rctx.clearRect(0, 0, state.w, state.h);
        rctx.save();
        rctx.globalCompositeOperation = 'screen';
        rctx.lineCap = 'round';
        rctx.lineJoin = 'round';
        rctx.shadowColor = 'rgba(255,255,255,.65)';
        rctx.shadowBlur = 8;

        for (const r of state.ripples) {
          const age = (now - r.birth) / 1000;
          if (age < 0 || age > r.life) continue;
          const progress = age / r.life;
          const radius = r.radius + r.speed * age;
          const fade = Math.sin(Math.PI * clamp(progress, 0, 1)) * Math.exp(-progress * 1.2);
          const baseAlpha = (r.kind === 'splash' ? .37 : .20) * fade * settings.ripple;
          if (baseAlpha < .004) continue;

          for (let band = 0; band < 4; band++) {
            const bandRadius = radius - band * (r.kind === 'splash' ? 12 : 8);
            if (bandRadius <= 4) continue;
            const alpha = baseAlpha * (1 - band * .20);
            const width = Math.max(.55, (r.kind === 'splash' ? 2.0 : 1.35) - band * .22);
            drawOrganicRing(rctx, r.x, r.y, bandRadius, alpha, r.seed + band * 20.7, now, width);
          }

          const glowRadius = radius * .985;
          const gradient = rctx.createRadialGradient(r.x, r.y, Math.max(0, glowRadius - 24), r.x, r.y, glowRadius + 18);
          gradient.addColorStop(0, 'rgba(255,255,255,0)');
          gradient.addColorStop(.60, `rgba(255,255,255,${baseAlpha * .10})`);
          gradient.addColorStop(.72, `rgba(197,248,255,${baseAlpha * .22})`);
          gradient.addColorStop(1, 'rgba(255,255,255,0)');
          rctx.fillStyle = gradient;
          rctx.beginPath();
          rctx.arc(r.x, r.y, glowRadius + 20, 0, TAU);
          rctx.fill();
        }

        rctx.restore();
      }

      function buildCaustics() {
        state.caustics = Array.from({ length: isTouchDevice ? 24 : 34 }, (_, i) => ({
          x: Math.random() * state.w,
          y: Math.random() * state.h,
          len: rand(state.w * .12, state.w * .34),
          amp: rand(8, 24),
          phase: rand(0, TAU),
          speed: rand(.00018, .00058),
          drift: rand(.10, .36),
          angle: rand(-.85, .85),
          width: rand(.55, 1.55),
          alpha: rand(.045, .14),
          curve: Math.random() > .5 ? 1 : -1
        }));
      }

      function drawCaustics(now) {
        cctx.clearRect(0, 0, state.w, state.h);
        cctx.save();
        cctx.globalCompositeOperation = 'screen';
        cctx.lineCap = 'round';
        cctx.lineJoin = 'round';
        cctx.shadowColor = 'rgba(255,255,255,.84)';
        cctx.shadowBlur = 9;

        const p = state.pointer;
        const influenceX = (p.x / state.w - .5) * 24 * settings.light;
        const influenceY = (p.y / state.h - .5) * 24 * settings.light;
        const energy = Math.min(1.25, p.energy) * settings.light;

        for (const line of state.caustics) {
          const phase = line.phase + now * line.speed;
          const cx = (line.x + Math.sin(phase * 1.7) * 22 + influenceX * line.drift + state.w) % state.w;
          const cy = (line.y + Math.cos(phase * 1.3) * 18 + influenceY * line.drift + state.h) % state.h;
          const angle = line.angle + Math.sin(phase * .7) * .24 + energy * .035;
          const cos = Math.cos(angle);
          const sin = Math.sin(angle);
          const segments = 9;

          cctx.beginPath();
          for (let i = 0; i <= segments; i++) {
            const t = i / segments;
            const along = (t - .5) * line.len;
            const wave = Math.sin(t * Math.PI * 2 + phase * 3.5) * line.amp + Math.sin(t * Math.PI * 4 - phase * 2.6) * line.amp * .35;
            const px = cx + along * cos + wave * sin * line.curve;
            const py = cy + along * sin - wave * cos * line.curve;
            if (i === 0) cctx.moveTo(px, py);
            else cctx.lineTo(px, py);
          }
          const shimmer = .55 + Math.sin(phase * 4.0) * .30 + Math.sin(phase * 7.2) * .15;
          const alpha = line.alpha * settings.light * shimmer;
          cctx.lineWidth = line.width;
          cctx.strokeStyle = `rgba(255,255,255,${alpha})`;
          cctx.stroke();

          if (Math.sin(phase * 5.0) > .94 && settings.light > .35) {
            const gx = cx + Math.cos(phase) * line.len * .18;
            const gy = cy + Math.sin(phase * 1.3) * line.amp;
            drawStar(cctx, gx, gy, rand(2.0, 4.2), alpha * 2.8, phase);
          }
        }

        cctx.restore();
      }

      function spawnSparkles(x, y, count, energy = 1) {
        const maxParticles = isTouchDevice ? 120 : 170;
        const n = Math.min(count, maxParticles - state.particles.length);
        if (n <= 0 || settings.sparkle <= .01) return;
        for (let i = 0; i < n; i++) {
          const a = Math.random() * TAU;
          const spread = rand(4, 28 + energy * 18);
          const speed = rand(8, 44 + energy * 34);
          state.particles.push({
            x: x + Math.cos(a) * spread,
            y: y + Math.sin(a) * spread,
            vx: Math.cos(a) * speed + state.pointer.vx * rand(.003, .014),
            vy: Math.sin(a) * speed + state.pointer.vy * rand(.003, .014),
            size: rand(.9, 3.4 + energy * .55),
            life: 0,
            maxLife: rand(.45, 1.35),
            spin: rand(0, TAU),
            spinSpeed: rand(-4, 4),
            kind: Math.random() > .72 ? 'star' : 'dot',
            hueShift: Math.random()
          });
        }
      }

      function drawStar(ctx, x, y, size, alpha, spin = 0) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(spin);
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = 'rgba(255,255,255,.95)';
        ctx.lineWidth = Math.max(.55, size * .12);
        ctx.shadowColor = 'rgba(255,255,255,.9)';
        ctx.shadowBlur = size * 2.2;
        ctx.beginPath();
        ctx.moveTo(-size * 2.2, 0);
        ctx.lineTo(size * 2.2, 0);
        ctx.moveTo(0, -size * 2.2);
        ctx.lineTo(0, size * 2.2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, size * .52, 0, TAU);
        ctx.fillStyle = 'rgba(255,255,255,.95)';
        ctx.fill();
        ctx.restore();
      }

      function drawSparkles(dt, now) {
        sctx.clearRect(0, 0, state.w, state.h);
        sctx.save();
        sctx.globalCompositeOperation = 'screen';

        for (let i = state.particles.length - 1; i >= 0; i--) {
          const p = state.particles[i];
          p.life += dt;
          if (p.life >= p.maxLife) {
            state.particles.splice(i, 1);
            continue;
          }

          const age = p.life / p.maxLife;
          const fade = Math.sin(Math.PI * age) * (1 - age * .18) * settings.sparkle;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vx *= Math.pow(.90, dt * 60);
          p.vy *= Math.pow(.90, dt * 60);
          p.vy -= 1.8 * dt;
          p.spin += p.spinSpeed * dt;

          const twinkle = .70 + .30 * Math.sin(now * .012 + p.spin * 2.3);
          const alpha = fade * twinkle;
          if (alpha <= .005) continue;

          const radius = p.size * (1 + age * .8);
          const gradient = sctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius * 3.0);
          gradient.addColorStop(0, `rgba(255,255,255,${alpha})`);
          gradient.addColorStop(.35, `rgba(225,250,255,${alpha * .45})`);
          gradient.addColorStop(.65, `rgba(255,225,244,${alpha * .18})`);
          gradient.addColorStop(1, 'rgba(255,255,255,0)');
          sctx.fillStyle = gradient;
          sctx.beginPath();
          sctx.arc(p.x, p.y, radius * 3, 0, TAU);
          sctx.fill();

          if (p.kind === 'star') drawStar(sctx, p.x, p.y, radius * 1.1, alpha * .85, p.spin);
        }

        sctx.restore();
      }

      function updateSystems(now, dt) {
        state.pointer.energy *= Math.pow(.90, dt * 60);
        state.pointer.speed *= Math.pow(.86, dt * 60);
        state.pointer.vx *= Math.pow(.88, dt * 60);
        state.pointer.vy *= Math.pow(.88, dt * 60);
        updateAmbientMusic();
        updateKoi(dt, now);

        for (let i = state.ripples.length - 1; i >= 0; i--) {
          const r = state.ripples[i];
          const age = (now - r.birth) / 1000;
          const radius = r.radius + r.speed * age;
          if (age > r.life || radius > r.maxRadius + 60) state.ripples.splice(i, 1);
        }

        if (!reduceMotion && Math.random() < .035 * settings.sparkle) {
          const x = rand(state.w * .08, state.w * .92);
          const y = rand(state.h * .12, state.h * .88);
          spawnSparkles(x, y, 1, .18);
        }
      }

      function frame(now) {
        const dt = clamp((now - (state.time || now)) / 1000, 0.001, 0.045);
        state.time = now;
        updateSystems(now, dt);
        drawWater(now);
        drawKoi(now);
        drawRipples(now);
        drawCaustics(now);
        drawSparkles(dt, now);
        requestAnimationFrame(frame);
      }

      function seedOpeningMotion() {
        const points = [
          [state.w * .26, state.h * .30, .65],
          [state.w * .72, state.h * .43, .52],
          [state.w * .45, state.h * .68, .42]
        ];
        points.forEach((p, i) => {
          setTimeout(() => {
            addRipple(p[0], p[1], p[2], 'splash');
            spawnSparkles(p[0], p[1], 5, .6);
          }, 180 + i * 260);
        });
      }


      cameraBtn.addEventListener('click', () => {
        startAmbientMusic();
        const out = document.createElement('canvas');
        out.width = waterCanvas.width;
        out.height = waterCanvas.height;
        const octx = out.getContext('2d');
        octx.drawImage(waterCanvas, 0, 0);
        octx.drawImage(fishCanvas, 0, 0);
        octx.drawImage(rippleCanvas, 0, 0);
        octx.drawImage(causticCanvas, 0, 0);
        octx.drawImage(sparkleCanvas, 0, 0);
        out.toBlob((blob) => {
          if (!blob) return;
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'eau-de-printemps-ripples.png';
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 500);
        }, 'image/png');
      });
    })();
  </script>
</body>
</html>
